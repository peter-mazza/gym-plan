}

function restoreWarmupStates(){
  var data = loadData();
  ["d1","d2","d3","d4","d5","d3-act"].forEach(function(dayId){
    var pd = _panelDates[dayId];
    var wk = pd ? _isoWeekKey(pd) : null;
    var isCurrentWeek = !wk || wk === getPacificWeekKey();
    var isDone = isCurrentWeek && !!(data.warmupChecks && data.warmupChecks[dayId]);
    if(!isDone){
      var arch = wk && data.checksHistory && data.checksHistory[wk];
      if(arch) isDone = !!(arch.warmupChecks && arch.warmupChecks[dayId]);
    }
    var btn = document.getElementById("warmup-check-" + dayId);
    var block = document.getElementById("warmup-block-" + dayId);
    if(btn){ btn.className = "check-btn" + (isDone ? " done" : ""); btn.textContent = isDone ? "\u2713" : ""; }
    if(block){ block.style.opacity = isDone ? "0.65" : "1"; block.style.borderColor = isDone ? "var(--green)" : "var(--border)"; }
  });
}

function getExName(exId){
  var found = exId;
  var _exState = getProgramState(new Date());
  Object.keys(EXERCISES).forEach(function(d){
    Object.keys(EXERCISES[d]).forEach(function(s){
      EXERCISES[d][s].forEach(function(ex){ if(ex.id === exId) found = getExerciseName(ex, _exState.phase, _exState.weekInPhase); });
    });
  });
  return found;
}

// ── Save weight - no renderAll to prevent mid-workout issues ─
async function saveWeight(exId, dayId){
  var s1el = document.getElementById("input-" + exId + "-s1");
  var s2el = document.getElementById("input-" + exId + "-s2");
  var s3el = document.getElementById("input-" + exId + "-s3");
  var s4el = document.getElementById("input-" + exId + "-s4");
  var s5el = document.getElementById("input-" + exId + "-s5");
  var s1 = s1el ? s1el.value.trim() : "";
  var s2 = s2el ? s2el.value.trim() : "";
  var s3 = s3el ? s3el.value.trim() : "";
  var s4 = s4el ? s4el.value.trim() : "";
  var s5 = s5el ? s5el.value.trim() : "";
  if(!s1 && !s2 && !s3 && !s4 && !s5){ showToast("Enter at least one set", "var(--accent2)"); return; }

  var now = _panelDates[dayId] || new Date();
  var dateStr = now.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
  var dayTitle = "";
  DAYS.forEach(function(d){ if(d.id === dayId) dayTitle = d.title; });

  // Save locally
  var data = loadData();
  if(!data.history) data.history = {};
  if(!data.history[exId]) data.history[exId] = [];
  data.history[exId].push({date:dateStr, dayLabel:dayTitle, s1:s1, s2:s2, s3:s3, s4:s4, s5:s5});
  var hist = data.history[exId];
  if(hist.length >= 2 && hist[hist.length-2].date === dateStr){
    hist.splice(hist.length-2, 1);
  }
  // Saving sets means this exercise is done — mark it so navigation shows it complete
  if(!data.checks) data.checks = {};
  data.checks[exId] = true;
  saveData(data);
  markDayComplete(dayId, _isoWeekKey(now));

  // Update card display in-place without full re-render
  var summary = [];
  if(s1) summary.push("S1:" + s1);
  if(s2) summary.push("S2:" + s2);
  if(s3) summary.push("S3:" + s3);
  if(s4) summary.push("S4:" + s4);
  if(s5) summary.push("S5:" + s5);
  var summaryStr = summary.join(" ");
  var card = document.getElementById("card-" + exId);
  if(card){
    // Mark done immediately
    card.classList.add("done");
    var cb = card.querySelector(".check-btn");
    if(cb){ cb.classList.add("done"); cb.innerHTML = "&#10003;"; }
    // Add Edit button if not already present
    if(!card.querySelector(".edit-entry-btn")){
      var eb = document.createElement("button");
      eb.className = "edit-entry-btn"; eb.textContent = "Edit";
      eb.onclick = (function(eid, did){ return function(e){ e.stopPropagation(); openEditMode(eid, did); }; })(exId, dayId);
      var md = card.querySelector(".exercise-main");
      var ib = card.querySelector(".info-btn");
      if(md && ib) md.insertBefore(eb, ib);
    }
    // Update prev-weight hint on card face
    var prevEl = card.querySelector(".prev-weight");
    if(prevEl){ prevEl.textContent = summaryStr; }
    else{
      var metaEl = card.querySelector(".exercise-meta");
      if(metaEl){
        var sp = document.createElement("span");
        sp.className = "prev-weight";
        sp.textContent = summaryStr;
        metaEl.appendChild(sp);
      }
    }
    // Clear inputs and update placeholders to just-saved values
    if(s1el){ s1el.placeholder = s1 || "-"; s1el.value = ""; }
    if(s2el){ s2el.placeholder = s2 || "-"; s2el.value = ""; }
    if(s3el){ s3el.placeholder = s3 || "-"; s3el.value = ""; }
    if(s4el){ s4el.placeholder = s4 || "-"; s4el.value = ""; }
    if(s5el){ s5el.placeholder = s5 || "-"; s5el.value = ""; }
  }

  var allSetVals = [s1,s2,s3,s4,s5].map(parseFloat).filter(function(v){ return !isNaN(v) && v > 0; });
  if(allSetVals.length > 0 && card){
    var newMax = Math.max.apply(null, allSetVals);
    var existingBadge = card.querySelector('.pr-badge');
    if(existingBadge) existingBadge.remove();
    if(_prMap[exId] && newMax > _prMap[exId]){
      _prMap[exId] = newMax;
      var prBadge = document.createElement('span');
      prBadge.className = 'pr-badge';
      prBadge.textContent = 'PR';
      var metaEl = card.querySelector('.exercise-meta');
      if(metaEl) metaEl.appendChild(prBadge);
      showToast('New PR — ' + getExName(exId));
    } else if(!_prMap[exId]){
      _prMap[exId] = newMax;
    }
  }

  var msg = document.getElementById("saved-" + exId);
  if(msg){ msg.style.display = "block"; setTimeout(function(){ msg.style.display = "none"; }, 1500); }

  // Auto-collapse detail panel after brief "Saved!" flash
  setTimeout(function(){
    var card2 = document.getElementById("card-" + exId);
    if(card2){
      var detail2 = card2.querySelector(".exercise-detail");
      var infoBtn2 = card2.querySelector(".info-btn");
      if(detail2){ detail2.classList.remove("open"); }
      if(infoBtn2){ infoBtn2.classList.remove("open"); infoBtn2.textContent = "i"; }
      var saveBtnR = card2.querySelector(".save-btn");
      if(saveBtnR) saveBtnR.textContent = "Save Sets";
    }
  }, 400);

  // Post to Sheets with pending queue for reliability
  var exName = getExName(exId);
  var params = "type=exercise&date=" + encodeURIComponent(dateStr) + "&day=" + encodeURIComponent(dayTitle) + "&exercise=" + encodeURIComponent(exName) + "&set1=" + encodeURIComponent(s1) + "&set2=" + encodeURIComponent(s2) + "&set3=" + encodeURIComponent(s3) + "&set4=" + encodeURIComponent(s4) + "&set5=" + encodeURIComponent(s5);
  queuePending(params);
  updatePendingIndicator();
  try{
    await fetch(SHEETS_URL + "?" + params, {method:"GET", mode:"no-cors"});
    dequeuePending(params);
    showToast("Saved to Sheets");
  }catch(e){
    showToast("Queued — will retry on next load", "var(--accent2)");
  }
  updatePendingIndicator();
}

// ── Save workout ─────────────────────────────────────────────
async function saveWorkout(dayId){
  var saveBtn0 = document.getElementById("wrap-save-btn-" + dayId);
  if(saveBtn0 && saveBtn0.disabled) return;
  if(saveBtn0){ saveBtn0.disabled = true; saveBtn0.style.opacity = "0.5"; }

  var dur = (document.getElementById("stat-dur-" + dayId)||{}).value || "";
  var cal = (document.getElementById("stat-cal-" + dayId)||{}).value || "";
  var hr = (document.getElementById("stat-hr-" + dayId)||{}).value || "";
  var cardioEl = document.getElementById("cardio-" + dayId);
  var cardioDurEl = document.getElementById("cardio-dur-" + dayId);
  var notesEl = document.getElementById("notes-" + dayId);
  var cardio = cardioEl ? cardioEl.value.trim() : "";
  var cardioMinutes = cardioDurEl ? cardioDurEl.value.trim() : "";
  var notes = notesEl ? notesEl.value.trim() : "";
  dur = dur.trim(); cal = cal.trim(); hr = hr.trim();
  if(!dur && !cal && !hr && !cardio && !cardioMinutes && !notes){ showToast("Nothing to save", "var(--accent2)"); return; }

  var now = _panelDates[dayId] || new Date();
  var dateStr = now.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
  var dayTitle = "";
  DAYS.forEach(function(d){ if(d.id === dayId) dayTitle = d.title; });

  // Detect if editing an existing entry (current week cache or archived past date)
  var existingSaved = null;
  try{ existingSaved = JSON.parse(localStorage.getItem("pgymplan_lastwrap_" + dayId)); }catch(e){}
  var _edata = loadData();
  var isEdit = (existingSaved && existingSaved.date === dateStr) ||
               !!(_edata.wrapHistory && _edata.wrapHistory[dayId + "_" + dateStr]);
  var type = isEdit ? "edit_workout" : "workout";

  try{
    var params = "type=" + type
      + "&date=" + encodeURIComponent(dateStr)
      + "&originalDate=" + encodeURIComponent(dateStr)
      + "&day=" + encodeURIComponent(dayTitle)
      + "&cardio=" + encodeURIComponent(cardio)
      + "&cardioMinutes=" + encodeURIComponent(cardioMinutes)
      + "&duration=" + encodeURIComponent(dur)
      + "&calories=" + encodeURIComponent(cal)
      + "&heartRate=" + encodeURIComponent(hr)
      + "&notes=" + encodeURIComponent(notes);
    await fetch(SHEETS_URL + "?" + params, {method:"GET", mode:"no-cors"});

    // Persist to localStorage — fields stay filled
    try{
      localStorage.setItem("pgymplan_lastwrap_" + dayId, JSON.stringify({
        weekKey: getPacificWeekKey(),
        date: dateStr,
        day: dayTitle,
        dur:dur, cal:cal, hr:hr, cardio:cardio, cardioMinutes:cardioMinutes, notes:notes
      }));
    }catch(e){}
    // Archive by date so past-day navigation can restore this
    try{
      var wdata = loadData();
      if(!wdata.wrapHistory) wdata.wrapHistory = {};
      wdata.wrapHistory[dayId + "_" + dateStr] = {dur:dur, cal:cal, hr:hr, cardio:cardio, cardioMinutes:cardioMinutes, notes:notes};
      saveData(wdata);
    }catch(e){}

    var _wk = _panelDates[dayId] ? _isoWeekKey(_panelDates[dayId]) : getPacificWeekKey();
    markDayComplete(dayId, _wk);
    var saveBtn = document.getElementById("wrap-save-btn-" + dayId);
    if(saveBtn) saveBtn.textContent = "Update Workout";
    var loggedBadge = document.getElementById("wrap-logged-" + dayId);
    if(loggedBadge) loggedBadge.style.display = "block";
    var wrapBlock = document.getElementById("wrap-block-" + dayId);
    if(wrapBlock) wrapBlock.classList.add("logged");
    showToast(isEdit ? "Workout updated in Sheets" : "Workout saved to Sheets");
  }catch(e){
    showToast("Failed to save", "var(--accent2)");
  }finally{
    if(saveBtn0){ saveBtn0.disabled = false; saveBtn0.style.opacity = ""; }
  }
}

// ── Week utilities ───────────────────────────────────────────
function _isoWeekKey(d){
  var t = new Date(d); t.setHours(0,0,0,0);
  t.setDate(t.getDate() + 3 - (t.getDay()+6)%7);
  var w1 = new Date(t.getFullYear(),0,4);
  var wn = 1 + Math.round(((t-w1)/86400000 - 3 + (w1.getDay()+6)%7)/7);
  return t.getFullYear() + "-W" + String(wn).padStart(2,"0");
}
function getPacificWeekKey(){ return _isoWeekKey(new Date()); }
function getWeekKeyForDate(ds){ if(!ds) return null; var d=new Date(ds); return isNaN(d)?null:_isoWeekKey(d); }
function isThisWeek(ds){ return getWeekKeyForDate(ds) === getPacificWeekKey(); }

function weekDateRange(weekKey){
  var parts = weekKey.split("-W");
  var year = parseInt(parts[0]), wn = parseInt(parts[1]);
  var jan4 = new Date(year, 0, 4);
  var monday = new Date(jan4);
  monday.setDate(jan4.getDate() - (jan4.getDay()+6)%7 + (wn-1)*7);
  var sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  var opts = {month:"short", day:"numeric"};
  return "Week of " + monday.toLocaleDateString("en-US", opts) + " - " + sunday.toLocaleDateString("en-US", opts);
}

function weekStartDate(weekKey){
  var parts = weekKey.split("-W");
  var year = parseInt(parts[0]), wn = parseInt(parts[1]);
  var jan4 = new Date(year, 0, 4);
  var monday = new Date(jan4);
  monday.setDate(jan4.getDate() - (jan4.getDay()+6)%7 + (wn-1)*7);
  return monday.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

function isAdjacentWeek(wk1, wk2){
  var p1 = wk1.split("-W"), p2 = wk2.split("-W");
  var y1 = parseInt(p1[0]), w1 = parseInt(p1[1]);
  var y2 = parseInt(p2[0]), w2 = parseInt(p2[1]);
  return (y2 === y1 && w2 === w1 + 1) || (y2 === y1 + 1 && w2 === 1 && w1 >= 52);
}

function markDayComplete(dayId, weekKey){
  var data = loadData();
  if(!data.weekDone) data.weekDone = {};
  weekKey = weekKey || getPacificWeekKey();
  if(!data.weekDone[weekKey]) data.weekDone[weekKey] = {};
  data.weekDone[weekKey][dayId] = true;
  saveData(data);
  updateDayTabColors();
}

function updateDayTabColors(){
  var data = loadData();
  var monday = getMondayOf(viewedDate);
  var mondayKey = toDateKey(monday);
  var weekOverride = WEEK_DOW_OVERRIDES[mondayKey] || {};
  var panelIds = ['d1','d2','d3','d4','d5'];
  var pills = document.querySelectorAll('.day-pill');
  pills.forEach(function(pill, i){
    if(i >= panelIds.length) return;
    var dayDate = new Date(monday); dayDate.setDate(monday.getDate()+i);
    var weekKey = _isoWeekKey(dayDate);
    var actualPanelId = (weekOverride[i] !== undefined) ? weekOverride[i] : panelIds[i];
    var done = !!(data.weekDone && data.weekDone[weekKey] && data.weekDone[weekKey][actualPanelId]);
    pill.classList.toggle('week-done', done && !pill.classList.contains('rest'));
  });
}

var _exCharts = {};
async function toggleExGraph(exId, exName, linkEl){
  var container = document.getElementById("graph-container-" + exId);
  if(!container) return;
  var isHidden = container.style.display === "none";
  if(!isHidden){
    container.style.display = "none";
    if(linkEl) linkEl.textContent = "Show progression graph";
    if(_exCharts[exId]){ _exCharts[exId].destroy(); delete _exCharts[exId]; }
    return;
  }
  if(linkEl) linkEl.textContent = "Loading...";
  try{
    var resp = await fetch(SHEETS_URL + "?type=history&exercise=" + encodeURIComponent(exName));
    var json = await resp.json();
    if(!json.rows || json.rows.length === 0){
      container.style.display = "block";
      container.innerHTML = "<div class='hist-loading'>Not enough data for a graph yet</div>";
      if(linkEl) linkEl.textContent = "Hide graph";
      return;
    }
    var rows = json.rows;
    var labels = rows.map(function(r){ return fmtDate(r.date); });
    var s1 = rows.map(function(r){ return parseFloat(r.set1)||null; });
    var s2 = rows.map(function(r){ return parseFloat(r.set2)||null; });
    var s3 = rows.map(function(r){ return parseFloat(r.set3)||null; });
    container.style.display = "block";
    container.innerHTML = "<canvas id='graph-canvas-" + exId + "' height='160'></canvas>";
    var canvas = document.getElementById("graph-canvas-" + exId);
    if(_exCharts[exId]){ _exCharts[exId].destroy(); }
    _exCharts[exId] = new Chart(canvas, {
      type:"line",
      data:{
        labels:labels,
        datasets:[
          {label:"Set 1",data:s1,borderColor:"#C42B1C",backgroundColor:"rgba(196,43,28,0.08)",tension:0.3,pointRadius:4,pointBackgroundColor:"#C42B1C",spanGaps:true},
          {label:"Set 2",data:s2,borderColor:"#B86F00",backgroundColor:"rgba(184,111,0,0.08)",tension:0.3,pointRadius:4,pointBackgroundColor:"#B86F00",spanGaps:true},
          {label:"Set 3",data:s3,borderColor:"#2A5E44",backgroundColor:"rgba(42,94,68,0.08)",tension:0.3,pointRadius:4,pointBackgroundColor:"#2A5E44",spanGaps:true}
        ]
      },
      options:{
        responsive:true,
        plugins:{legend:{labels:{color:"#948F88",font:{size:10},pointStyle:"line",usePointStyle:true}}},
        scales:{
          x:{ticks:{color:"#948F88",font:{size:9},maxRotation:45},grid:{color:"#C5C0B8"}},
          y:{ticks:{color:"#948F88",font:{size:9}},grid:{color:"#C5C0B8"}}
        }
      }
    });
    if(linkEl) linkEl.textContent = "Hide graph";
  }catch(err){
    container.style.display = "block";
    container.innerHTML = "<div class='hist-loading'>Could not load graph</div>";
    if(linkEl) linkEl.textContent = "Show progression graph";
  }
}

var _heatmapRows = [];
function buildHeatmap(rows, period){
  if(rows) _heatmapRows = rows;
  period = period || "1mo";
  var grid = document.getElementById("heatmap-grid");
  var startLabel = document.getElementById("heatmap-start");
  if(!grid) return;
  var gymDates = {}, actDates = {};
  _heatmapRows.forEach(function(r){
    if(!r.date) return;
    var key = new Date(r.date).toDateString();
    if(r.day && r.day.indexOf("DAY") === 0) gymDates[key] = true;
    else actDates[key] = true;
  });
  grid.innerHTML = "";
  var today = new Date(); today.setHours(0,0,0,0);
  var daysBack;
  if(period === "2wk") daysBack = 13;
  else if(period === "3mo") daysBack = 89;
  else if(period === "all"){
    var earliest = new Date(today);
    _heatmapRows.forEach(function(r){
      if(r.date){ var d = new Date(r.date); if(!isNaN(d) && d < earliest) earliest = d; }
    });
    daysBack = Math.max(Math.floor((today - earliest) / 86400000), 13);
  } else {
    daysBack = 29;
  }
  var start = new Date(today); start.setDate(today.getDate() - daysBack);
  if(startLabel) startLabel.textContent = start.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  for(var i=0; i<=daysBack; i++){
    var d = new Date(start); d.setDate(start.getDate() + i);
    var key = d.toDateString();
    var cell = document.createElement("div");
    cell.className = "heatmap-day" + (gymDates[key] ? " active" : (actDates[key] ? " activity" : ""));
    cell.title = d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    grid.appendChild(cell);
  }
}

var _consistencyChart = null;
function buildConsistencyChart(rows){
  var canvas = document.getElementById("consistencyChart");
  if(!canvas) return;
  var weekCounts = {};
  var weekOrder = [];
  rows.forEach(function(r){
    var wk = getWeekKeyForDate(r.date);
    if(!wk) return;
    if(!weekCounts[wk]){ weekCounts[wk] = 0; weekOrder.push(wk); }
    weekCounts[wk]++;
  });
  var uniqueWeeks = weekOrder.filter(function(v,i){ return weekOrder.indexOf(v)===i; }).slice(-12);
  if(uniqueWeeks.length === 0) return;
  var pcts = uniqueWeeks.map(function(w){ return Math.min(Math.round((weekCounts[w]/4)*100), 100); });
  var colors = pcts.map(function(p){ return p >= 100 ? "rgba(42,94,68,0.8)" : "rgba(196,43,28,0.6)"; });
  if(_consistencyChart){ _consistencyChart.destroy(); }
  _consistencyChart = new Chart(canvas, {
    type:"bar",
    data:{labels:uniqueWeeks.map(function(w){ return weekStartDate(w); }),datasets:[{label:"% of target (4 sessions)",data:pcts,backgroundColor:colors,borderColor:colors.map(function(c){ return c.replace("0.8","1").replace("0.6","1"); }),borderWidth:1}]},
    options:{responsive:true,plugins:{legend:{labels:{color:"#948F88",font:{size:10},pointStyle:"line",usePointStyle:true}}},scales:{x:{ticks:{color:"#948F88",font:{size:8},maxRotation:45},grid:{color:"#C5C0B8"}},y:{min:0,max:100,ticks:{color:"#948F88",font:{size:9},callback:function(v){ return v+"%"; }},grid:{color:"#C5C0B8"}}}}
  });
}

function buildPRTable(){
  var el = document.getElementById("pr-table");
  if(!el) return;
  var data = loadData();
  var history = data.history || {};
  var prs = [];
  Object.keys(history).forEach(function(exId){
    var entries = history[exId];
    var exName = getExName(exId);
    var maxWt = 0;
    entries.forEach(function(e){
      [e.s1,e.s2,e.s3,e.s4,e.s5].forEach(function(v){
        var n = parseFloat(v);
        if(!isNaN(n) && n > maxWt) maxWt = n;
      });
    });
    if(maxWt > 0) prs.push({name:exName, weight:maxWt});
  });
  if(prs.length === 0){ el.innerHTML = "<div class='hist-loading'>No exercise data logged yet</div>"; return; }
  prs.sort(function(a,b){ return b.weight - a.weight; });
  var html = "<div class='pr-card'>";
  prs.forEach(function(p){
    html += "<div class='pr-row'><span class='pr-name'>" + p.name + "</span><span class='pr-val'>" + p.weight + " lbs</span></div>";
  });
  html += "</div>";
  el.innerHTML = html;
}

var _strengthIndexChart = null;
function buildStrengthIndex(){
  var canvas = document.getElementById("strengthIndexChart");
  if(!canvas) return;
  var data = loadData();
  var history = data.history || {};
  // Build map: date -> list of max set weights (one per exercise)
  var dateMaxes = {};
  Object.keys(history).forEach(function(exId){
    var entries = history[exId];
    entries.forEach(function(e){
      var maxWt = 0;
      [e.s1,e.s2,e.s3,e.s4,e.s5].forEach(function(v){
        var n = parseFloat(v);
        if(!isNaN(n) && n > maxWt) maxWt = n;
      });
      if(maxWt > 0){
        if(!dateMaxes[e.date]) dateMaxes[e.date] = [];
        dateMaxes[e.date].push(maxWt);
      }
    });
  });
  var dates = Object.keys(dateMaxes).sort(function(a,b){ return new Date(a)-new Date(b); });
  if(dates.length < 2) return;
  var avgs = dates.map(function(d){
    var vals = dateMaxes[d];
    return Math.round(vals.reduce(function(a,b){ return a+b; },0) / vals.length);
  });
  if(_strengthIndexChart){ _strengthIndexChart.destroy(); }
  _strengthIndexChart = new Chart(canvas, {
    type:"line",
    data:{labels:dates.map(function(d){ return fmtDate(d).replace(", 2026",""); }),datasets:[{label:"Strength Index",data:avgs,borderColor:"#C42B1C",backgroundColor:"rgba(196,43,28,0.08)",tension:0.3,pointRadius:3,pointBackgroundColor:"#C42B1C"}]},
    options:{responsive:true,plugins:{legend:{labels:{color:"#948F88",font:{size:10},pointStyle:"line",usePointStyle:true}}},scales:{x:{ticks:{color:"#948F88",font:{size:9},maxRotation:45},grid:{color:"#C5C0B8"}},y:{ticks:{color:"#948F88",font:{size:9}},grid:{color:"#C5C0B8"}}}}
  });
}

var _top3Charts = [];

  var el = document.getElementById("top3-progressions");
  if(!el) return;
  var data = loadData();
  var history = data.history || {};
  // Find top 3 exercises by session count
  var exCounts = Object.keys(history).map(function(exId){
    return {exId:exId, count:history[exId].length};
  });
  exCounts.sort(function(a,b){ return b.count - a.count; });
  var top3 = exCounts.slice(0,3);
  _top3Charts.forEach(function(c){ c.destroy(); });
  _top3Charts = [];
  el.innerHTML = "";
  if(top3.length === 0){ el.innerHTML = "<div class='hist-loading'>No exercise data yet</div>"; return; }
  top3.forEach(function(item, idx){
    var exId = item.exId;

    var entries = history[exId].slice().sort(function(a,b){ return new Date(a.date)-new Date(b.date); });
    var labels = entries.map(function(e){ return fmtDate(e.date).replace(", 2026",""); });
    var maxSets = entries.map(function(e){
      var m = 0;
      [e.s1,e.s2,e.s3,e.s4,e.s5].forEach(function(v){ var n=parseFloat(v); if(!isNaN(n)&&n>m) m=n; });

    wrap.appendChild(title);
    var canvasEl = document.createElement("canvas");
    canvasEl.height = 120;

    wrap.appendChild(canvasEl);
    el.appendChild(wrap);

    var bgColors = ["rgba(196,43,28,0.08)","rgba(184,111,0,0.08)","rgba(42,94,68,0.08)"];
    _top3Charts.push(new Chart(canvasEl, {
      type:"line",
      data:{labels:labels,datasets:[{label:"Max set (lbs)",data:maxSets,borderColor:colors[idx],backgroundColor:bgColors[idx],tension:0.3,pointRadius:3,pointBackgroundColor:colors[idx],spanGaps:true}]},

    }));

// ── Stats panel (updated with weekly + all-time graphs) ───────
var _weeklyChart = null;
var _allTimeChart = null;
async function loadStats(){
  var weekEl = document.getElementById("stats-week");
  if(!weekEl) return;
  weekEl.innerHTML = "<div style='color:var(--muted);font-size:13px;'>Loading...</div>";
  try{
    var resp = await fetch(SHEETS_URL + "?type=stats_workouts");
    var json = await resp.json();
    var rows = (json && json.rows) ? json.rows : [];

    // ── Weekly summary ──────────────────────────────────────
    var weekRows = rows.filter(function(r){ return isThisWeek(r.date); });
    var totalDur=0, totalCal=0, totalHR=0, hrCnt=0, sessionCnt=weekRows.length;
    weekRows.forEach(function(r){
      if(r.duration && !isNaN(parseFloat(r.duration))) totalDur += parseFloat(r.duration);
      if(r.calories && !isNaN(parseFloat(r.calories))) totalCal += parseFloat(r.calories);
      if(r.heartRate && !isNaN(parseFloat(r.heartRate))){ totalHR += parseFloat(r.heartRate); hrCnt++; }
    });
    var weekKey = getPacificWeekKey();
    var html = "<div class='week-summary-card'>"
      + "<div class='week-summary-row'><span class='week-label'>Week</span><span class='week-val'>" + weekDateRange(weekKey) + "</span></div>"
      + "<div class='week-summary-row'><span class='week-label'>Sessions</span><span class='week-val'>" + sessionCnt + "</span></div>"
      + (totalDur>0?"<div class='week-summary-row'><span class='week-label'>Total Duration</span><span class='week-val'>"+Math.round(totalDur)+" min</span></div>":"")
      + (totalCal>0?"<div class='week-summary-row'><span class='week-label'>Total Calories</span><span class='week-val'>"+Math.round(totalCal)+"</span></div>":"")
      + (hrCnt>0?"<div class='week-summary-row'><span class='week-label'>Avg Heart Rate</span><span class='week-val'>"+(totalHR/hrCnt).toFixed(0)+" BPM</span></div>":"")
      + "</div>";
    weekEl.innerHTML = html;

    // ── Monthly + YTD totals ─────────────────────────────────
    var now = new Date();
    var periodEl = document.getElementById("stats-period");
    if(periodEl){
      function sumRows(arr){
        var dur=0,cal=0,cnt=arr.length;
        arr.forEach(function(r){
          if(r.duration&&!isNaN(parseFloat(r.duration))) dur+=parseFloat(r.duration);
          if(r.calories&&!isNaN(parseFloat(r.calories))) cal+=parseFloat(r.calories);
        });
        return {dur:Math.round(dur),cal:Math.round(cal),cnt:cnt};
      }
      function parseRowDate(ds){ var d=new Date(ds); return isNaN(d)?null:d; }
      var moRows=rows.filter(function(r){ var d=parseRowDate(r.date); return d&&d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth(); });
      var ytdRows=rows.filter(function(r){ var d=parseRowDate(r.date); return d&&d.getFullYear()===now.getFullYear(); });
      var mo=sumRows(moRows), ytd=sumRows(ytdRows);
      var moName=now.toLocaleString('en-US',{month:'long'});
      periodEl.innerHTML="<div class='week-summary-card'>"
        +"<div class='week-summary-row'><span class='week-label'>"+moName+" Sessions</span><span class='week-val'>"+mo.cnt+"</span></div>"
        +(mo.dur>0?"<div class='week-summary-row'><span class='week-label'>"+moName+" Duration</span><span class='week-val'>"+mo.dur+" min</span></div>":"")
        +(mo.cal>0?"<div class='week-summary-row'><span class='week-label'>"+moName+" Calories</span><span class='week-val'>"+mo.cal+"</span></div>":"")
        +"<div class='week-summary-row' style='border-top:1px solid var(--border);padding-top:8px;margin-top:4px;'><span class='week-label'>YTD Sessions</span><span class='week-val'>"+ytd.cnt+"</span></div>"
        +(ytd.dur>0?"<div class='week-summary-row'><span class='week-label'>YTD Duration</span><span class='week-val'>"+ytd.dur+" min</span></div>":"")
        +(ytd.cal>0?"<div class='week-summary-row'><span class='week-label'>YTD Calories</span><span class='week-val'>"+ytd.cal+"</span></div>":"")
        +"</div>";
    }

    // ── Streak calculation ───────────────────────────────────
    var weekCounts = {};
    rows.forEach(function(r){
      var wk = getWeekKeyForDate(r.date);
      if(wk) weekCounts[wk] = (weekCounts[wk]||0) + 1;
    });
    var allWeeks = Object.keys(weekCounts).sort();
    var qualWeeks = allWeeks.filter(function(w){ return weekCounts[w] >= 3; });
    var bestStreak = 0, runStreak = 0;
    for(var wi = 0; wi < qualWeeks.length; wi++){
      runStreak = (wi === 0 || !isAdjacentWeek(qualWeeks[wi-1], qualWeeks[wi])) ? 1 : runStreak + 1;
      if(runStreak > bestStreak) bestStreak = runStreak;
    }
    var curWk = getPacificWeekKey();
    var currentStreak = 0;
    if(qualWeeks.length > 0){
      var lastQual = qualWeeks[qualWeeks.length - 1];
      if(lastQual === curWk || isAdjacentWeek(lastQual, curWk)){
        currentStreak = runStreak;
      }
    }
    var streakUnit = " wk";
    var curEl = document.getElementById("streak-current");
    var bestEl = document.getElementById("streak-best");
    if(curEl) curEl.textContent = currentStreak + streakUnit;
    if(bestEl) bestEl.textContent = bestStreak + streakUnit;

    // ── Weekly chart — last 10 sessions, duration bars ──────
    var recentRows = rows.slice(-10);
    var wLabels = recentRows.map(function(r){ return fmtDate(r.date).replace(", 2026",""); });
    var wDur = recentRows.map(function(r){ return parseFloat(r.duration)||0; });
    var wCal = recentRows.map(function(r){ return parseFloat(r.calories)||0; });
    var wCanvas = document.getElementById("weeklyChart");
    if(wCanvas){
      if(_weeklyChart){ _weeklyChart.destroy(); }
      _weeklyChart = new Chart(wCanvas,{
        type:"bar",
        data:{
          labels:wLabels,
          datasets:[
            {label:"Duration (min)",data:wDur,backgroundColor:"rgba(196,43,28,0.7)",borderColor:"#C42B1C",borderWidth:1,yAxisID:"y"},
            {label:"Calories",data:wCal,backgroundColor:"rgba(184,111,0,0.5)",borderColor:"#B86F00",borderWidth:1,yAxisID:"y1"}
          ]
        },
        options:{
          responsive:true,
          plugins:{legend:{labels:{color:"#948F88",font:{size:10},pointStyle:"line",usePointStyle:true}}},
          scales:{
            x:{ticks:{color:"#948F88",font:{size:9},maxRotation:45},grid:{color:"#C5C0B8"}},
            y:{ticks:{color:"#948F88",font:{size:9}},grid:{color:"#C5C0B8"},title:{display:true,text:"min",color:"#948F88",font:{size:9}}},
            y1:{position:"right",ticks:{color:"#948F88",font:{size:9}},grid:{drawOnChartArea:false},title:{display:true,text:"cal",color:"#948F88",font:{size:9}}}
          }
        }
      });
    }

    // ── All-time chart — rolling avg HR line ─────────────────
    var hrRows = rows.filter(function(r){ return r.heartRate && !isNaN(parseFloat(r.heartRate)); });
    var atLabels = hrRows.map(function(r){ return fmtDate(r.date).replace(", 2026",""); });
    var atHR = hrRows.map(function(r){ return parseFloat(r.heartRate); });
    var atDur = hrRows.map(function(r){ return parseFloat(r.duration)||null; });
    var atCanvas = document.getElementById("allTimeChart");
    if(atCanvas && hrRows.length > 0){
      if(_allTimeChart){ _allTimeChart.destroy(); }
      _allTimeChart = new Chart(atCanvas,{
        type:"line",
        data:{
          labels:atLabels,
          datasets:[
            {label:"Avg HR (BPM)",data:atHR,borderColor:"#C42B1C",backgroundColor:"rgba(196,43,28,0.08)",tension:0.3,pointRadius:3,pointBackgroundColor:"#C42B1C",yAxisID:"y"},
            {label:"Duration (min)",data:atDur,borderColor:"#2A5E44",backgroundColor:"rgba(42,94,68,0.08)",tension:0.3,pointRadius:3,pointBackgroundColor:"#2A5E44",spanGaps:true,yAxisID:"y1"}
          ]
        },
        options:{
          responsive:true,
          plugins:{legend:{labels:{color:"#948F88",font:{size:10},pointStyle:"line",usePointStyle:true}}},
          scales:{
            x:{ticks:{color:"#948F88",font:{size:9},maxRotation:45},grid:{color:"#C5C0B8"}},
            y:{ticks:{color:"#948F88",font:{size:9}},grid:{color:"#C5C0B8"},title:{display:true,text:"BPM",color:"#948F88",font:{size:9}}},
            y1:{position:"right",ticks:{color:"#948F88",font:{size:9}},grid:{drawOnChartArea:false},title:{display:true,text:"min",color:"#948F88",font:{size:9}}}
          }
        }
      });
    } else if(atCanvas){
      atCanvas.parentElement.innerHTML = "<div style='color:var(--muted);font-size:13px;padding:10px 0;'>Log more workouts with HR data to see this graph.</div>";
    }

    buildHeatmap(rows, "1mo");
    buildCardioDonut(rows);
    buildMonthlyCount(rows);
    buildDayTypeDistribution(rows);
    buildAvgDurByDay(rows);
    buildConsistencyChart(rows);
    buildPRTable();
    buildStrengthIndex();
    buildTop3Progressions();

  }catch(err){
    if(weekEl) weekEl.innerHTML = "<div style='color:var(--muted);font-size:13px;'>Could not load stats.</div>";
  }
}

// ── Multi-cardio duration UI ──────────────────────────────────
function updateMultiCardioDurationUI(dayId){
  var pillsContainer = document.getElementById("cardio-pills-" + dayId);
  if(!pillsContainer) return;
  var activePills = [];
  pillsContainer.querySelectorAll(".cardio-pill.active").forEach(function(p){ activePills.push(p.textContent.trim()); });

  var singleContainer = document.getElementById("cardio-dur-single-" + dayId);
  var multiContainer  = document.getElementById("cardio-dur-multi-"  + dayId);
  var textInput = document.getElementById("cardio-" + dayId);

  if(activePills.length <= 1){
    // Single or no selection — standard single-duration input
    if(singleContainer) singleContainer.style.display = "";
    if(multiContainer){
      multiContainer.style.display = "none";
      while(multiContainer.firstChild) multiContainer.removeChild(multiContainer.firstChild);
    }
    if(textInput) textInput.value = activePills.length === 1 ? activePills[0] : "";
  } else {
    // Multiple selection — per-type duration inputs
    if(singleContainer) singleContainer.style.display = "none";
    if(multiContainer) multiContainer.style.display = "";

    // Preserve any values already entered before rebuilding
    var existingVals = {};
    if(multiContainer){
      multiContainer.querySelectorAll("input[data-cardio-type]").forEach(function(inp){
        existingVals[inp.dataset.cardioType] = inp.value;
      });
    }

    // Rebuild per-type rows with DOM methods (avoids innerHTML)
    while(multiContainer.firstChild) multiContainer.removeChild(multiContainer.firstChild);
    activePills.forEach(function(type){
      var row = document.createElement("div");
      row.style.cssText = "display:flex;align-items:center;gap:8px;margin-bottom:6px;";

      var lbl = document.createElement("span");
      lbl.style.cssText = "font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,.65);min-width:64px;flex-shrink:0;";
      lbl.textContent = type;

      var inp = document.createElement("input");
      inp.className = "stat-input";
      inp.type = "text";
      inp.inputMode = "decimal";
      inp.placeholder = "min";
      inp.dataset.cardioType = type;
      inp.id = "cardio-dur-" + dayId + "-" + type.toLowerCase();
      inp.style.flex = "1";
      inp.oninput = (function(did){ return function(){ saveCardioPersist(did); }; })(dayId);
      if(existingVals[type]) inp.value = existingVals[type];

      row.appendChild(lbl);
      row.appendChild(inp);
      multiContainer.appendChild(row);
    });

    // Update text input with combined type string (used by saveWorkout)
    if(textInput) textInput.value = activePills.join(" + ");
  }
}

function showNextWorkout(){
  var today = new Date(); today.setHours(0,0,0,0);
  var candidate = new Date(today); candidate.setDate(today.getDate() + 1);
  var limit = new Date(today); limit.setDate(today.getDate() + 14);
  while(candidate <= limit){
    var dow = candidate.getDay();
    if(dow !== 0 && dow !== 6){
      var dateKey = toDateKey(candidate);
      var exception = EXCEPTION_DATES[dateKey];
      if(!exception || !exception.rest){
        var restEl = document.getElementById('rest-screen');
        if(restEl) restEl.style.display='none';
        viewedDate = new Date(candidate);
        renderWeekNav();
        var mondayKey = toDateKey(getMondayOf(candidate));
        var weekOverride = WEEK_DOW_OVERRIDES[mondayKey] || {};
        var dowIdx = candidate.getDay() - 1;
        var panelId = (weekOverride[dowIdx] !== undefined) ? weekOverride[dowIdx] : (DOW_TO_PANEL[candidate.getDay()] || 'd1');
        var newMon = getMondayOf(candidate);
        ['d1','d2','d3','d4','d5'].forEach(function(pid, i){
          var d = new Date(newMon); d.setDate(newMon.getDate() + i); _panelDates[pid] = d;
        });
        showDayForDate(panelId, candidate);
        return;
      }
    }
    candidate.setDate(candidate.getDate() + 1);
  }
  // Fallback: next Monday
  var mon = getMondayOf(new Date(today)); mon.setDate(mon.getDate() + 7);
  var restEl2 = document.getElementById('rest-screen');
  if(restEl2) restEl2.style.display='none';
  viewedDate = mon;
  renderWeekNav();
  ['d1','d2','d3','d4','d5'].forEach(function(pid, i){
    var d = new Date(mon); d.setDate(mon.getDate() + i); _panelDates[pid] = d;
  });
  showDayForDate('d1', mon);
}

// ── Show a specific date's workout ───────────────────────────
function showDayForDate(panelId, date){
  viewedDate = new Date(date);
  _panelDates[panelId] = new Date(date);
  var state = getProgramState(date);

  var restEl = document.getElementById('rest-screen');
  if(restEl) restEl.style.display='none';

  // Mark active pill
  document.querySelectorAll('.day-pill').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('#secondaryNav .day-btn').forEach(function(b){ b.classList.remove('active'); });
  var dateKey = toDateKey(date);
  var monday = getMondayOf(date);
  for(var i=0; i<5; i++){
    var d = new Date(monday); d.setDate(monday.getDate()+i);
    if(toDateKey(d)===dateKey){
      var pills = document.querySelectorAll('.day-pill');
      if(pills[i]) pills[i].classList.add('active');
    }
  }

  renderPhaseHeader(state);

  if(state.isRest || state.preProgram){
    showRestScreen(state);
    return;
  }

  document.querySelectorAll('.day-panel').forEach(function(p){ p.classList.remove('active'); });
  var panel = document.getElementById(panelId);
  if(panel){
    panel.classList.add('active');
    renderPanel(panelId, state.phase);
    restoreWarmupStates();
    updateDeloadBanner(panelId, state);
    updateWeekBanner(panelId, state);
    updateFinisher(panelId, state);
  }

  window.scrollTo(0,0);
  try{ localStorage.setItem('pgymplan_lastday', panelId); }catch(e){}

  var WDAYS = ['d1','d2','d3','d4','d5'];
  if(WDAYS.indexOf(panelId)!==-1){
    var dayObj=null; DAYS.forEach(function(d){ if(d.id===panelId) dayObj=d; });
    if(dayObj){ loadDayHistory(panelId,dayObj.title); loadCardioHistory(panelId); }
    loadWrapPersist(panelId); loadCardioPersist(panelId);
    var today = new Date(); today.setHours(0,0,0,0);
    var viewedDay = new Date(_panelDates[panelId] || new Date()); viewedDay.setHours(0,0,0,0);
    if(viewedDay.getTime() < today.getTime()){
      // If local history already has entries for this date, mark the pill green immediately
      var _vds = (_panelDates[panelId] || new Date()).toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
      var _ld = loadData(); var _secs = EXERCISES[panelId];
      if(_secs && Object.keys(_secs).some(function(sid){
        return _secs[sid].some(function(ex){
          return (_ld.history && _ld.history[ex.id] || []).some(function(e){ return e.date === _vds; });
        });
      })){ markDayComplete(panelId, _isoWeekKey(_panelDates[panelId] || new Date())); }
      backfillFromSheets(panelId, _panelDates[panelId] || new Date());
      backfillWrapFromSheets(panelId, _panelDates[panelId] || new Date());
    } else {
      prefetchTodayHistory(panelId);
    }
  }
}

// ── Set checks for bodyweight exercises ──────────────────────
function toggleSetCheck(exId, setIdx){
  var data = loadData();
  if(!data.setBChecks) data.setBChecks = {};
  if(!data.setBChecks[exId]) data.setBChecks[exId] = [false,false,false];
  data.setBChecks[exId][setIdx] = !data.setBChecks[exId][setIdx];
  saveData(data);
  var btn = document.getElementById("setcheck-" + exId + "-" + setIdx);
  if(btn){ btn.classList.toggle("done", data.setBChecks[exId][setIdx]); btn.textContent = data.setBChecks[exId][setIdx] ? "\u2713" : ""; }
  var allDone = data.setBChecks[exId].every(function(v){ return v; });
  if(allDone && !(data.checks && data.checks[exId])){
    if(!data.checks) data.checks = {};
    data.checks[exId] = true; saveData(data);
    var _dId = exId.split("_")[0]; var _dPd = _panelDates[_dId];
    markDayComplete(_dId, _dPd ? _isoWeekKey(_dPd) : getPacificWeekKey());
    var card = document.getElementById("card-" + exId);
    if(card){ card.classList.add("done"); var cb = card.querySelector(".check-btn"); if(cb){ cb.classList.add("done"); cb.textContent = "\u2713"; } }
  } else if(!allDone && data.checks && data.checks[exId]){
    data.checks[exId] = false; saveData(data);
    var card2 = document.getElementById("card-" + exId);
    if(card2){ card2.classList.remove("done"); var cb2 = card2.querySelector(".check-btn"); if(cb2){ cb2.classList.remove("done"); cb2.textContent = ""; } }
  }
}

// ── Cardio finisher persist ───────────────────────────────────
function saveCardioPersist(dayId){
  var pillsContainer = document.getElementById("cardio-pills-" + dayId);
  var multiContainer  = document.getElementById("cardio-dur-multi-"  + dayId);
  var typeEl  = document.getElementById("cardio-"     + dayId);
  var durEl   = document.getElementById("cardio-dur-" + dayId);
  var doneBtn = document.getElementById("finisher-done-" + dayId);

  var activePills = [];
  if(pillsContainer) pillsContainer.querySelectorAll(".cardio-pill.active").forEach(function(p){ activePills.push(p.textContent.trim()); });

  var cardioType = "", cardioDur = "";
  if(activePills.length >= 2 && multiContainer && multiContainer.style.display !== "none"){
    var durs = [];
    activePills.forEach(function(type){
      var inp = multiContainer.querySelector("[data-cardio-type='" + type + "']");
      durs.push(inp ? inp.value.trim() : "");
    });
    cardioType = activePills.join(" + ");
    cardioDur  = durs.join(" + ");
    // Keep aggregate duration in sync so saveWorkout can read it from the DOM
    if(durEl) durEl.value = cardioDur;
  } else {
    cardioType = typeEl ? typeEl.value.trim() : "";
    cardioDur  = durEl  ? durEl.value.trim()  : "";
  }

  var _now = _panelDates[dayId] || new Date();
  var cardioData = {
    weekKey: getPacificWeekKey(),
    date: _now.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"}),
    type: cardioType,
    duration: cardioDur,
    done: doneBtn ? doneBtn.classList.contains("done") : false
  };
  try{ localStorage.setItem("pgymplan_cardio_" + dayId, JSON.stringify(cardioData)); }catch(e){}
  // Archive by date so past-day navigation can restore this
  try{
    var now = _panelDates[dayId] || new Date();
    var dStr = now.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
    var cdata = loadData();
    if(!cdata.cardioHistory) cdata.cardioHistory = {};
    cdata.cardioHistory[dayId + "_" + dStr] = {type:cardioType, duration:cardioDur, done:cardioData.done};
    saveData(cdata);
  }catch(e){}
}

function loadCardioPersist(dayId){
  try{
    var panelDate = _panelDates[dayId];
    var panelDateStr = panelDate ? panelDate.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"}) : null;
    var cached = JSON.parse(localStorage.getItem("pgymplan_cardio_" + dayId));
    var saved = null;
    if(cached && panelDateStr && cached.date === panelDateStr){
      saved = cached;
    } else if(cached && !panelDateStr && cached.weekKey === getPacificWeekKey()){
      saved = cached;
    } else if(panelDateStr){
      var data = loadData();
      saved = data.cardioHistory ? (data.cardioHistory[dayId + "_" + panelDateStr] || null) : null;
    }
    // Reset finisher state before applying saved values
    var finEl0      = document.getElementById("finisher-"           + dayId);
    var doneBtn0    = document.getElementById("finisher-done-"      + dayId);
    var typeEl0     = document.getElementById("cardio-"             + dayId);
    var durEl0      = document.getElementById("cardio-dur-"         + dayId);
    var multiCont0  = document.getElementById("cardio-dur-multi-"   + dayId);
    var singleCont0 = document.getElementById("cardio-dur-single-"  + dayId);
    var pillsCont0  = document.getElementById("cardio-pills-"       + dayId);
    if(finEl0) finEl0.classList.remove("done");
    if(pillsCont0) pillsCont0.querySelectorAll(".cardio-pill").forEach(function(p){ p.classList.remove("active"); });
    if(doneBtn0){ doneBtn0.classList.remove("done"); doneBtn0.textContent = ""; }
    if(typeEl0) typeEl0.value = "";
    if(durEl0)  durEl0.value  = "";
    if(multiCont0){
      multiCont0.style.display = "none";
      while(multiCont0.firstChild) multiCont0.removeChild(multiCont0.firstChild);
    }
    if(singleCont0) singleCont0.style.display = "";
    if(!saved) return;

    if(saved.type){
      var types = saved.type.split(" + ").map(function(t){ return t.trim(); }).filter(function(t){ return t; });
      var durs  = (saved.duration || "").split(" + ").map(function(d){ return d.trim(); });
      var pillsCont = document.getElementById("cardio-pills-" + dayId);
      if(types.length >= 2 && pillsCont){
        // Multi-type: activate each pill then build per-type inputs
        types.forEach(function(type){
          pillsCont.querySelectorAll(".cardio-pill").forEach(function(p){
            if(p.textContent.trim() === type) p.classList.add("active");
          });
        });
        updateMultiCardioDurationUI(dayId);
        var multiCont = document.getElementById("cardio-dur-multi-" + dayId);
        if(multiCont){
          types.forEach(function(type, i){
            var inp = multiCont.querySelector("[data-cardio-type='" + type + "']");
            if(inp && durs[i]) inp.value = durs[i];
          });
        }
      } else {
        // Single type: original behavior
        var typeElR = document.getElementById("cardio-"     + dayId);
        var durElR  = document.getElementById("cardio-dur-" + dayId);
        if(typeElR) typeElR.value = saved.type;
        if(durElR && saved.duration) durElR.value = saved.duration;
        if(pillsCont){ pillsCont.querySelectorAll(".cardio-pill").forEach(function(p){ if(p.textContent.trim() === saved.type) p.classList.add("active"); }); }
      }
    } else if(saved.duration){
      var durElF = document.getElementById("cardio-dur-" + dayId);
      if(durElF) durElF.value = saved.duration;
    }
    if(saved.done){
      var doneBtn = document.getElementById("finisher-done-" + dayId);
      var finEl2 = document.getElementById("finisher-" + dayId);
      if(doneBtn){ doneBtn.classList.add("done"); doneBtn.textContent = "\u2713"; }
      if(finEl2) finEl2.classList.add("done");
    }
  }catch(e){}
}

// ── Wrap-up persist ───────────────────────────────────────────
function loadWrapPersist(dayId){
  try{
    var panelDate = _panelDates[dayId];
    var panelDateStr = panelDate ? panelDate.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"}) : null;
    var cached = JSON.parse(localStorage.getItem("pgymplan_lastwrap_" + dayId));
    // Match by exact date; fall back to current-week cache when panel date unknown (init)
    var saved = null;
    if(cached && panelDateStr && cached.date === panelDateStr){
      saved = cached;
    } else if(cached && !panelDateStr && cached.weekKey === getPacificWeekKey()){
      saved = cached;
    } else if(panelDateStr){
      var data = loadData();
      saved = data.wrapHistory ? (data.wrapHistory[dayId + "_" + panelDateStr] || null) : null;
    }
    var wrapBlock = document.getElementById("wrap-block-" + dayId);
    if(!saved){
      var sb0 = document.getElementById("wrap-save-btn-" + dayId);
      if(sb0) sb0.textContent = "Save Workout";
      var lb0 = document.getElementById("wrap-logged-" + dayId);
      if(lb0) lb0.style.display = "none";
      if(wrapBlock) wrapBlock.classList.remove("logged");
      var durEl0 = document.getElementById("stat-dur-" + dayId);
      var calEl0 = document.getElementById("stat-cal-" + dayId);
      var hrEl0 = document.getElementById("stat-hr-" + dayId);
      var notesEl0 = document.getElementById("notes-" + dayId);
      if(durEl0) durEl0.value = "";
      if(calEl0) calEl0.value = "";
      if(hrEl0) hrEl0.value = "";
      if(notesEl0) notesEl0.value = "";
      return;
    }
    var durEl = document.getElementById("stat-dur-" + dayId);
    var calEl = document.getElementById("stat-cal-" + dayId);
    var hrEl = document.getElementById("stat-hr-" + dayId);
    var notesEl = document.getElementById("notes-" + dayId);
    if(durEl) durEl.value = saved.dur || "";
    if(calEl) calEl.value = saved.cal || "";
    if(hrEl) hrEl.value = saved.hr || "";
    if(notesEl) notesEl.value = saved.notes || "";
    var saveBtn = document.getElementById("wrap-save-btn-" + dayId);
    var isToday = panelDateStr && panelDateStr === new Date().toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
    if(saveBtn) saveBtn.textContent = "Update Workout";
    var loggedBadge = document.getElementById("wrap-logged-" + dayId);
    if(loggedBadge) loggedBadge.style.display = "block";
    if(wrapBlock) wrapBlock.classList.add("logged");
  }catch(e){}
}

// ── Finisher done toggle ──────────────────────────────────────
function toggleFinisherDone(dayId){
  var btn = document.getElementById("finisher-done-" + dayId);
  if(!btn) return;
  var isDone = btn.classList.toggle("done");
  var finEl = document.getElementById("finisher-" + dayId);
  if(finEl) finEl.classList.toggle("done", isDone);
  btn.textContent = isDone ? "\u2713" : "";
  saveCardioPersist(dayId);
}

// ── Heatmap period selector ───────────────────────────────────
function setHeatmapPeriod(period, btn){
  document.querySelectorAll(".heatmap-period-pill").forEach(function(p){ p.classList.remove("active"); });
  if(btn) btn.classList.add("active");
  buildHeatmap(null, period);
}

// ── Init ─────────────────────────────────────────────────────
buildNav();
buildPanels();
clearStaleChecks();
renderAll();
updateDayTabColors();
(function(){
  flushPending();

  var today = new Date();
  var state = getProgramState(today);
  renderPhaseHeader(state);

  var lastDay = null;
  try{ lastDay = localStorage.getItem('pgymplan_lastday'); }catch(e){}

  if(state.isRest || state.preProgram){
    showRestScreen(state);
  } else if(state.panelId){
    showDayForDate(state.panelId, today);
  } else {
    showDay('d1');
  }

  ['d1','d2','d3','d4','d5'].forEach(function(did){
    loadWrapPersist(did);
    loadCardioPersist(did);
  });

  // Pre-fill wrap block from WorkoutDoors shortcut params (?dur=&cal=&hr=)
  (function(){
    var urlP = new URLSearchParams(window.location.search);
    var pDur = urlP.get('dur'), pCal = urlP.get('cal'), pHr = urlP.get('hr');
    if(!pDur && !pCal && !pHr) return;
    var did = state.panelId || 'd1';
    setTimeout(function(){
      var durEl = document.getElementById('stat-dur-' + did);
      var calEl = document.getElementById('stat-cal-' + did);
      var hrEl  = document.getElementById('stat-hr-'  + did);
      if(durEl && pDur) durEl.value = pDur;
      if(calEl && pCal) calEl.value = pCal;
      if(hrEl  && pHr)  hrEl.value  = pHr;
      // Scroll wrap block into view
      var wrap = document.getElementById('wrap-' + did) || document.querySelector('.stats-block');
      if(wrap) wrap.scrollIntoView({behavior:'smooth', block:'center'});
    }, 300);
  })();
})();

// Re-run stale check when app returns to foreground (catches overnight/week-boundary sessions)
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible') clearStaleChecks();
});
</script>
