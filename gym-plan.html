<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Peter's Gym Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0e0e0f;--surface:#1a1a1c;--surface2:#242426;--accent:#e8ff47;--accent2:#ff6b35;--text:#f0efe8;--muted:#888884;--border:#2e2e30;--green:#4caf50;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.5;max-width:480px;margin:0 auto;padding-bottom:80px;}
  header{padding:22px 20px 12px;border-bottom:1px solid var(--border);}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:2px;color:var(--accent);line-height:1;}
  header p{color:var(--muted);font-size:11px;margin-top:3px;}
  .day-nav{display:flex;overflow-x:auto;gap:8px;padding:11px 20px;background:var(--bg);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);scrollbar-width:none;}
  .day-nav::-webkit-scrollbar{display:none;}
  .day-btn{flex-shrink:0;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;}
  .day-btn.active{background:var(--accent);color:#0e0e0f;border-color:var(--accent);}
  .day-btn.optional{border-style:dashed;}
  .day-panel{display:none;padding:20px;}
  .day-panel.active{display:block;}
  .day-label{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1.5px;line-height:1;}
  .day-subtitle{color:var(--muted);font-size:13px;margin-top:3px;}
  .skip-note{background:var(--surface2);border-left:3px solid var(--accent2);padding:8px 12px;border-radius:0 6px 6px 0;font-size:12px;color:var(--muted);margin-top:10px;}
  .section-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:20px 0 8px;}
  .exercise{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color .2s,opacity .2s;}
  .exercise.done{border-color:var(--green);opacity:.65;}
  .exercise-main{display:flex;align-items:center;padding:11px 12px;gap:8px;}
  .check-btn{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;color:transparent;}
  .check-btn.done{background:var(--green);border-color:var(--green);color:white;}
  .exercise-info{flex:1;min-width:0;}
  .exercise-name{font-weight:500;font-size:14px;}
  .exercise-meta{display:flex;align-items:center;gap:8px;margin-top:2px;flex-wrap:wrap;}
  .exercise-sets{font-weight:700;color:var(--accent);font-size:12px;}
  .prev-weight{font-size:11px;color:var(--accent2);font-weight:600;}
  .info-btn{background:var(--surface2);border:none;color:var(--muted);width:26px;height:26px;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
  .info-btn.open{background:var(--accent);color:#0e0e0f;}
  .exercise-detail{display:none;padding:0 12px 14px;border-top:1px solid var(--border);}
  .exercise-detail.open{display:block;}
  .tip-text{font-size:13px;color:var(--muted);margin-top:10px;line-height:1.6;}
  .tip-text strong{color:var(--text);}
  .weight-section{margin-top:14px;}
  .weight-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
  .sets-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
  .set-col{display:flex;flex-direction:column;gap:4px;}
  .set-col-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:1px;text-align:center;}
  .weight-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:8px 6px;width:100%;outline:none;transition:border-color .15s;text-align:center;}
  .weight-input:focus{border-color:var(--accent);}
  .weight-input::placeholder{color:var(--muted);font-weight:400;font-size:12px;}
  .save-btn{background:var(--accent);border:none;color:#0e0e0f;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;padding:8px 16px;border-radius:8px;cursor:pointer;width:100%;margin-top:4px;}
  .save-btn:active{opacity:.75;}
  .saved-msg{font-size:12px;color:var(--green);margin-top:6px;display:none;text-align:center;}
  .hist-loading{font-size:12px;color:var(--muted);padding:4px 0;}
  .history-list{margin-top:8px;background:var(--surface2);border-radius:8px;overflow:hidden;}
  .history-entry{font-size:12px;padding:7px 10px;border-bottom:1px solid var(--border);}
  .history-entry:last-child{border-bottom:none;}
  .h-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .h-date{color:var(--muted);white-space:nowrap;}
  .h-sets{color:var(--accent);font-weight:700;}
  .warmup-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
  .warmup-block .w-title{font-weight:600;font-size:13px;margin-bottom:4px;color:var(--accent2);}
  .warmup-item{font-size:13px;color:var(--muted);padding:2px 0;}
  .finisher{background:linear-gradient(135deg,#1e2200,#1a1a1c);border:1px solid var(--accent);border-radius:10px;padding:14px;margin-top:16px;}
  .finisher-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--accent);letter-spacing:1px;margin-bottom:4px;}
  .finisher-detail{font-size:13px;color:var(--muted);}
  .finisher-detail strong{color:var(--text);}
  .hist-block{margin-top:14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
  .hist-block-title{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .load-link{background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;padding:0;font-family:'DM Sans',sans-serif;text-decoration:underline;}
  .stats-block{margin-top:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .stats-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--accent);letter-spacing:1px;margin-bottom:12px;}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
  .stat-col{display:flex;flex-direction:column;gap:4px;}
  .stat-col-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:1px;text-align:center;text-transform:uppercase;}
  .stat-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:8px 6px;width:100%;outline:none;transition:border-color .15s;text-align:center;}
  .stat-input:focus{border-color:var(--accent);}
  .stat-input::placeholder{color:var(--muted);font-weight:400;font-size:12px;}
  .stats-save-btn{background:var(--accent);border:none;color:#0e0e0f;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;padding:8px 16px;border-radius:8px;cursor:pointer;width:100%;}
  .stats-save-btn:active{opacity:.75;}
  .notes-block{margin-top:14px;}
  .notes-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
  .notes-textarea{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:12px;width:100%;outline:none;resize:none;min-height:80px;line-height:1.5;transition:border-color .15s;}
  .notes-textarea:focus{border-color:var(--accent);}
  .notes-textarea::placeholder{color:var(--muted);}
  .reset-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 16px;border-radius:20px;cursor:pointer;margin-top:14px;display:block;width:100%;text-align:center;}
  .hr-zone{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .hr-zone:last-child{border-bottom:none;}
  .zone-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .macro-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;}
  .macro-name{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .macro-amount{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent);line-height:1;}
  .macro-note{font-size:12px;color:var(--muted);margin-top:4px;}
  .callout{background:var(--surface2);border-left:3px solid var(--accent2);padding:12px 14px;border-radius:0 8px 8px 0;font-size:13px;color:var(--muted);margin:10px 0;line-height:1.8;}
  .callout strong{color:var(--text);}
  .alt-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin-bottom:7px;}
  .alt-name{font-weight:600;font-size:14px;margin-bottom:2px;}
  .alt-note{font-size:13px;color:var(--muted);}
  .ref-link{display:inline-block;margin-top:6px;font-size:12px;color:var(--accent);text-decoration:none;}
  .stat-summary-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;}
  .stat-summary-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);}
  .stat-summary-row:last-child{border-bottom:none;}
  .stat-summary-label{color:var(--muted);}
  .stat-summary-val{font-weight:700;color:var(--accent);}
  .ex-prog-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
  .ex-prog-name{font-weight:600;font-size:13px;margin-bottom:8px;}
  .ex-prog-entries{display:flex;flex-direction:column;gap:4px;}
  .ex-prog-entry{display:flex;justify-content:space-between;font-size:12px;}
  .ex-prog-date{color:var(--muted);}
  .ex-prog-sets{color:var(--accent);font-weight:600;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:white;font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;}
  .toast.show{opacity:1;}
  .day-btn.week-done{border-color:var(--green);color:var(--green);}
  .day-btn.week-done.active{background:var(--green);color:#0e0e0f;border-color:var(--green);}
  .week-summary-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
  .week-summary-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);}
  .week-summary-row:last-child{border-bottom:none;}
  .week-label{color:var(--muted);}
  .week-val{font-weight:700;color:var(--accent);}
  .graph-container{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:12px;}
  .graph-title{font-weight:600;font-size:13px;margin-bottom:10px;color:var(--text);}
  .show-graph-link{background:none;border:none;color:var(--accent);font-size:11px;cursor:pointer;padding:4px 0 0;font-family:"DM Sans",sans-serif;text-decoration:underline;display:block;}
  .cardio-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .cardio-pill{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;}
  .cardio-pill.active{background:var(--accent);color:#0e0e0f;border-color:var(--accent);}
  .overload-nudge{font-size:12px;color:var(--accent);font-weight:600;margin-top:8px;padding:6px 10px;background:rgba(232,255,71,0.08);border-radius:6px;border-left:2px solid var(--accent);}
  .streak-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;gap:12px;}
  .streak-col{flex:1;text-align:center;}
  .streak-num{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;color:var(--accent);line-height:1;}
  .streak-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:3px;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<header>
  <h1>PETER'S GYM PLAN</h1>
  <p>4-day split · Southrac · 2026</p>
</header>
<div class="day-nav" id="dayNav"></div>
<div id="dayPanels"></div>
<div class="toast" id="toast"></div>
<script>
var SHEETS_URL = "https://script.google.com/macros/s/AKfycbyCbQUIngm3ikOI-TXGQIuvw3nrLi8zozffbU7oniIQ2f4Ypa9-qGn7ltjfs_s5y6vHnw/exec";

var DAYS = [
  { id:"d1", label:"Day 1", title:"DAY 1 - PUSH", subtitle:"Chest - Shoulders - Triceps - Core",

    finisherZone:"10-15 min - Zone 3 - HR 135-155" },
  { id:"d3", label:"Day 3", title:"DAY 3 - LEGS + GLUTES", subtitle:"Most important day for back health & testosterone",
    warmup:"5 min Incline Ramp - Zone 1-2 - HR 115-135",

    finisherNote:"Legs will be cooked - moderate incline at strong pace. Stair climber also solid after leg day.",
    finisherZone:"10-15 min - Zone 3 - HR 135-155" },
  { id:"d4", label:"Day 4", title:"DAY 4 - UPPER + CONDITIONING", subtitle:"No legs today - they need recovery after Day 3",
    skipNote:"Only 3 days this week? Drop this day. Days 1-3 cover everything.",
    warmup:"5 min Incline Ramp - Zone 1 - HR 100-120",
    finisherNote:"Push it. This is your conditioning day - the finisher matters more here.",
    finisherZone:"10-15 min - Zone 3 - HR 135-155" },
  { id:"d5", label:"Day 5 *", title:"DAY 5 - ARMS + SHOULDERS", subtitle:"Optional - Light on the body - Real workout",
    optional:true,
    warmup:"5 min Incline Ramp - Zone 1 - HR 100-120",
    finisherNote:"Slightly easier today. Bonus session - push it but do not bury yourself.",
    finisherZone:"10-15 min - Zone 2-3 - HR 125-150",
    recovery:true },
  { id:"stats", label:"Stats", title:"STATS", statsPanel:true },
  { id:"macros", label:"Macros", title:"MACROS", macrosPanel:true }
];

var EXERCISES = {
  d1: {
    "exercises-d1": [
      { id:"d1_incline_db_press", name:"Incline Dumbbell Press", sets:"3x10",
        tip:"Start weight: 25-35 lb dumbbells. Last 2 reps should feel hard without losing form.",

      { id:"d1_seated_db_press", name:"Seated DB Shoulder Press", sets:"3x10",
        tip:"Start weight: 20-30 lb dumbbells.",
        form:"Press in a slight forward arc. Stop just before lockout to keep tension." },
      { id:"d1_cable_lateral", name:"Cable Lateral Raise", sets:"3x12",

        form:"Stand sideways to cable. Lead with elbow, not wrist. No shrugging at the top." },
      { id:"d1_chest_fly", name:"Chest Fly Machine", sets:"3x12",
        tip:"Start weight: 40-60 lbs on the stack.",
        form:"Think hugging a tree, not pushing. Full stretch at open position, controlled close." },
      { id:"d1_rope_pushdown", name:"Tricep Rope Pushdown", sets:"3x12",
        tip:"Start weight: 30-40 lbs.",

      { id:"d1_oh_tricep", name:"Overhead Tricep Extension (cable)", sets:"3x12",
        tip:"Start weight: 20-30 lbs.",

    ],
    "core-d1": [
      { id:"d1_plank", name:"Plank", sets:"3x40 sec", noWeight:true,

      { id:"d1_dead_bug", name:"Dead Bug", sets:"3x10 each side", noWeight:true,

    ]
  },
  d2: {
    "exercises-d2": [

      { id:"d2_lat_pulldown", name:"Lat Pulldown (wide grip)", sets:"3x10",

      { id:"d2_db_row", name:"Single-Arm Dumbbell Row", sets:"3x10 each",

      { id:"d2_face_pull", name:"Face Pulls (cable)", sets:"3x15",

      { id:"d2_hammer_curl", name:"Hammer Curl", sets:"3x12",

    ],
    "core-d2": [
      { id:"d2_bird_dog", name:"Bird Dog", sets:"3x10 each side", noWeight:true,

  },
  d3: {
    "exercises-d3": [
      { id:"d3_goblet_squat", name:"Goblet Squat", sets:"3x12",

    "core-d3": [
      { id:"d3_ab_wheel", name:"Ab Wheel", sets:"3x10", noWeight:true,

  d4: {
    "exercises-d4": [
      { id:"d4_db_bench", name:"Dumbbell Bench Press", sets:"3x10",

      { id:"d4_cable_row", name:"Seated Cable Row (V-bar, narrow)", sets:"3x10",
        tip:"Same as Day 2.",
        form:"See Day 2 for full form cues." },
      { id:"d4_arnold_press", name:"Arnold Press", sets:"3x10",
        tip:"Start weight: 20-25 lbs each dumbbell.",
        form:"Start with palms facing you, rotate outward as you press up. Hits all three heads of the shoulder." },
      { id:"d4_face_pull", name:"Face Pulls", sets:"3x15",
        tip:"Repeated from Day 2 intentionally - shoulder health investment.",

    ],
    "core-d4": [
      { id:"d4_core_circuit", name:"Plank / Dead Bug / Bird Dog", sets:"3 rounds", noWeight:true,
        form:"Plank: 40 sec. Dead Bug: 10 each side. Bird Dog: 10 each side. Rest 30-45 sec between rounds." }
    ]

// ── Toast ────────────────────────────────────────────────────
var _toastTimer;
function showToast(msg, color){
  clearTimeout(_toastTimer);
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = color || "var(--green)";
  t.classList.add("show");
  _toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 2500);
}

// ── Date format ──────────────────────────────────────────────
function fmtDate(val){
  if(!val) return "";
  var d = new Date(val);
  if(isNaN(d.getTime())) return String(val);
  return d.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
}

function renderAll(){

    Object.keys(sections).forEach(function(sectionId){

  var lastSummary = "";
  if(lastEntry){
    var parts = [];
    if(lastEntry.s1) parts.push("S1:" + lastEntry.s1);
    if(lastEntry.s2) parts.push("S2:" + lastEntry.s2);
    if(lastEntry.s3) parts.push("S3:" + lastEntry.s3);
    lastSummary = parts.join(" ");
  }

  var card = document.createElement("div");
  card.className = "exercise" + (isDone ? " done" : "");
  card.id = "card-" + ex.id;

  // Main row
  var mainDiv = document.createElement("div");
  mainDiv.className = "exercise-main";

  var checkBtn = document.createElement("button");

  var metaDiv = document.createElement("div");
  metaDiv.className = "exercise-meta";
  var setsSpan = document.createElement("span");
  setsSpan.className = "exercise-sets";
  setsSpan.textContent = ex.sets;
  metaDiv.appendChild(setsSpan);
  if(lastSummary){
    var prevSpan = document.createElement("span");
    prevSpan.className = "prev-weight";
    prevSpan.textContent = lastSummary;
    metaDiv.appendChild(prevSpan);
  }
  infoDiv.appendChild(metaDiv);
  mainDiv.appendChild(infoDiv);

  var infoBtn = document.createElement("button");
  infoBtn.className = "info-btn";
  infoBtn.textContent = "i";
  infoBtn.onclick = (function(eid, ename, btn){ return function(){ toggleTip(btn, eid, ename); }; })(ex.id, ex.name, infoBtn);
  mainDiv.appendChild(infoBtn);

  // Detail panel
  var detailDiv = document.createElement("div");

  if(ex.tip){
    var tipP = document.createElement("p");

    detailDiv.appendChild(formP);
  }

  if(!ex.noWeight){
    var ph1 = lastEntry && lastEntry.s1 ? lastEntry.s1 : "-";
    var ph2 = lastEntry && lastEntry.s2 ? lastEntry.s2 : "-";
    var ph3 = lastEntry && lastEntry.s3 ? lastEntry.s3 : "-";

// ── Toggle tip panel ─────────────────────────────────────────
function toggleTip(btn, exId, exName){
  var card = document.getElementById("card-" + exId);
  var detail = card.querySelector(".exercise-detail");
  var open = detail.classList.toggle("open");
  btn.classList.toggle("open", open);
  btn.textContent = open ? "x" : "i";

// ── Live history from Sheets ─────────────────────────────────
async function fetchLiveHistory(exId, exName){
  var loadEl = document.getElementById("hist-loading-" + exId);
  var liveEl = document.getElementById("hist-live-" + exId);
  if(!liveEl) return;
  if(loadEl) loadEl.textContent = "Loading...";
  try{
    var resp = await fetch(SHEETS_URL + "?type=history&exercise=" + encodeURIComponent(exName));
    var json = await resp.json();
    if(loadEl) loadEl.textContent = "";
    if(!json.rows || json.rows.length === 0){
      liveEl.innerHTML = "<div class='hist-loading'>No history yet</div>";
      return;
    }
    var rows = json.rows.slice(-3).reverse();
    var div = document.createElement("div");
    div.className = "history-list";
    rows.forEach(function(r){
      var entry = document.createElement("div");
      entry.className = "history-entry";
      var row = document.createElement("div");
      row.className = "h-row";
      var dateSpan = document.createElement("span");
      dateSpan.className = "h-date";
      dateSpan.textContent = fmtDate(r.date);
      row.appendChild(dateSpan);
      var setsSpan = document.createElement("span");
      setsSpan.className = "h-sets";
      var parts = [];
      if(r.set1) parts.push("S1:" + r.set1);
      if(r.set2) parts.push("S2:" + r.set2);
      if(r.set3) parts.push("S3:" + r.set3);
      setsSpan.textContent = parts.join(" ");
      row.appendChild(setsSpan);
      entry.appendChild(row);
      div.appendChild(entry);
    });
    liveEl.innerHTML = "";
    liveEl.appendChild(div);
    // Progressive overload nudge based on most recent entry
    var lastRow = json.rows[json.rows.length - 1];
    var nudgeNums = [lastRow.set1, lastRow.set2, lastRow.set3].filter(function(v){ return v && !isNaN(parseFloat(v)); });
    if(nudgeNums.length > 0){
      var avgLast = nudgeNums.reduce(function(a,b){ return a + parseFloat(b); }, 0) / nudgeNums.length;
      var suggested = Math.round((avgLast + 2.5) * 2) / 2;
      var nudgeDiv = document.createElement("div");
      nudgeDiv.className = "overload-nudge";
      nudgeDiv.textContent = "\u2191 Try " + suggested + " lbs today (+2.5 from last session)";
      liveEl.appendChild(nudgeDiv);
    }
  }catch(err){
    if(loadEl) loadEl.textContent = "";
    liveEl.innerHTML = "<div class='hist-loading'>Could not load history</div>";
  }
}

      var row = document.createElement("div");

async function loadDayHistory(dayId, dayTitle){
  var el = document.getElementById("day-hist-" + dayId);
  if(!el) return;
  el.innerHTML = "<div class='hist-loading'>Loading...</div>";
  try{
    var resp = await fetch(SHEETS_URL + "?type=day_history&day=" + encodeURIComponent(dayTitle) + "&dayId=" + encodeURIComponent(dayId));
    var json = await resp.json();
    if(!json || !json.date){
      el.innerHTML = "<div class='hist-loading'>No previous " + dayTitle + " workout found</div>";
      return;
    }
    var html = "<div style='font-size:12px;color:var(--muted);margin-bottom:6px;'>" + fmtDate(json.date) + "</div>";
    if(json.cardio) html += "<div style='font-size:12px;margin-bottom:4px;'><span style='color:var(--muted);'>Cardio: </span><span style='color:var(--text);'>" + json.cardio + "</span></div>";
    if(json.duration) html += "<div style='font-size:12px;margin-bottom:4px;'><span style='color:var(--muted);'>Duration: </span><span style='color:var(--accent);'>" + json.duration + " min</span></div>";
    if(json.calories) html += "<div style='font-size:12px;margin-bottom:4px;'><span style='color:var(--muted);'>Calories: </span><span style='color:var(--accent);'>" + json.calories + "</span></div>";
    if(json.heartRate) html += "<div style='font-size:12px;margin-bottom:4px;'><span style='color:var(--muted);'>Avg HR: </span><span style='color:var(--accent);'>" + json.heartRate + " BPM</span></div>";
    if(json.notes) html += "<div style='font-size:12px;margin-bottom:4px;'><span style='color:var(--muted);'>Notes: </span><span style='color:var(--text);'>" + json.notes + "</span></div>";
    el.innerHTML = html;
  }catch(err){
    el.innerHTML = "<div class='hist-loading'>Could not load</div>";
  }
}

// ── Check / Reset ────────────────────────────────────────────
function toggleCheck(exId){
  var data = loadData();
  if(!data.checks) data.checks = {};
  data.checks[exId] = !data.checks[exId];
  saveData(data);
  var card = document.getElementById("card-" + exId);
  if(card){
    card.classList.toggle("done", data.checks[exId]);
    var btn = card.querySelector(".check-btn");
    btn.classList.toggle("done", data.checks[exId]);
    btn.innerHTML = data.checks[exId] ? "&#10003;" : "";
    // Auto-collapse detail when marking complete
    if(data.checks[exId]){
      var detail = card.querySelector(".exercise-detail");
      var infoBtn = card.querySelector(".info-btn");
      if(detail){ detail.classList.remove("open"); }
      if(infoBtn){ infoBtn.classList.remove("open"); infoBtn.textContent = "i"; }
    }
  }
}

function resetDay(dayId){
  var data = loadData();
  if(!data.checks) return;
  var sections = EXERCISES[dayId];
  if(!sections) return;
  Object.keys(sections).forEach(function(k){
    sections[k].forEach(function(ex){ delete data.checks[ex.id]; });
  });
  saveData(data);
  renderAll();
  showToast("Checkmarks reset", "#555");
}

function getExName(exId){
  var found = exId;
  Object.keys(EXERCISES).forEach(function(d){
    Object.keys(EXERCISES[d]).forEach(function(s){
      EXERCISES[d][s].forEach(function(ex){ if(ex.id === exId) found = ex.name; });
    });
  });
  return found;
}

// ── Save weight - no renderAll to prevent mid-workout issues ─
async function saveWeight(exId, dayId){
  var s1el = document.getElementById("input-" + exId + "-s1");
  var s2el = document.getElementById("input-" + exId + "-s2");
  var s3el = document.getElementById("input-" + exId + "-s3");
  var s1 = s1el ? s1el.value.trim() : "";
  var s2 = s2el ? s2el.value.trim() : "";
  var s3 = s3el ? s3el.value.trim() : "";
  if(!s1 && !s2 && !s3){ showToast("Enter at least one set", "var(--accent2)"); return; }

  var now = new Date();
  var dateStr = now.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
  var dayTitle = "";
  DAYS.forEach(function(d){ if(d.id === dayId) dayTitle = d.title; });

  // Save locally
  var data = loadData();
  if(!data.history) data.history = {};
  if(!data.history[exId]) data.history[exId] = [];
  data.history[exId].push({date:dateStr, dayLabel:dayTitle, s1:s1, s2:s2, s3:s3});
  saveData(data);

  // Update card display in-place without full re-render
  var summary = [];
  if(s1) summary.push("S1:" + s1);
  if(s2) summary.push("S2:" + s2);
  if(s3) summary.push("S3:" + s3);
  var summaryStr = summary.join(" ");
  var card = document.getElementById("card-" + exId);
  if(card){
    var prevEl = card.querySelector(".prev-weight");
    if(prevEl){ prevEl.textContent = summaryStr; }
    else{
      var metaEl = card.querySelector(".exercise-meta");
      if(metaEl){
        var sp = document.createElement("span");
        sp.className = "prev-weight";
        sp.textContent = summaryStr;
        metaEl.appendChild(sp);
      }
    }
    // Update placeholders
    if(s1el){ s1el.placeholder = s1; s1el.value = ""; }
    if(s2el){ s2el.placeholder = s2; s2el.value = ""; }
    if(s3el){ s3el.placeholder = s3; s3el.value = ""; }
    // Update weight label
    var wLabel = card.querySelector(".weight-label");
    if(wLabel){
      wLabel.textContent = "Log Weight";
      var lSpan = document.createElement("span");
      lSpan.style.cssText = "color:var(--accent2);font-size:11px;font-weight:600;margin-left:6px;";
      lSpan.textContent = summaryStr;
      wLabel.appendChild(lSpan);
    }
  }

  var msg = document.getElementById("saved-" + exId);
  if(msg){ msg.style.display = "block"; setTimeout(function(){ msg.style.display = "none"; }, 1500); }

  // Auto-collapse and mark complete
  setTimeout(function(){
    var card2 = document.getElementById("card-" + exId);
    if(card2){
      var detail2 = card2.querySelector(".exercise-detail");
      var infoBtn2 = card2.querySelector(".info-btn");
      if(detail2){ detail2.classList.remove("open"); }
      if(infoBtn2){ infoBtn2.classList.remove("open"); infoBtn2.textContent = "i"; }
      // Mark complete
      var data2 = loadData();
      if(!data2.checks) data2.checks = {};
      if(!data2.checks[exId]){
        data2.checks[exId] = true;
        saveData(data2);
        card2.classList.add("done");
        var checkBtn2 = card2.querySelector(".check-btn");
        if(checkBtn2){ checkBtn2.classList.add("done"); checkBtn2.innerHTML = "&#10003;"; }
      }
    }
  }, 400);

  // Post to Sheets
  try{
    var exName = getExName(exId);
    var params = "type=exercise&date=" + encodeURIComponent(dateStr) + "&day=" + encodeURIComponent(dayTitle) + "&exercise=" + encodeURIComponent(exName) + "&set1=" + encodeURIComponent(s1) + "&set2=" + encodeURIComponent(s2) + "&set3=" + encodeURIComponent(s3);
    await fetch(SHEETS_URL + "?" + params, {method:"GET", mode:"no-cors"});
    showToast("Saved to Sheets");
  }catch(e){ showToast("Saved locally", "var(--accent2)"); }
}

// ── Save workout ─────────────────────────────────────────────
async function saveWorkout(dayId){
  var dur = (document.getElementById("stat-dur-" + dayId)||{}).value || "";
  var cal = (document.getElementById("stat-cal-" + dayId)||{}).value || "";
  var hr = (document.getElementById("stat-hr-" + dayId)||{}).value || "";
  var cardioEl = document.getElementById("cardio-" + dayId);
  var notesEl = document.getElementById("notes-" + dayId);
  var cardio = cardioEl ? cardioEl.value.trim() : "";
  var notes = notesEl ? notesEl.value.trim() : "";
  dur = dur.trim(); cal = cal.trim(); hr = hr.trim();
  if(!dur && !cal && !hr && !cardio && !notes){ showToast("Nothing to save", "var(--accent2)"); return; }

  var now = new Date();
  var dateStr = now.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
  var dayTitle = "";
  DAYS.forEach(function(d){ if(d.id === dayId) dayTitle = d.title; });

  try{
    var params = "type=workout&date=" + encodeURIComponent(dateStr) + "&day=" + encodeURIComponent(dayTitle) + "&cardio=" + encodeURIComponent(cardio) + "&duration=" + encodeURIComponent(dur) + "&calories=" + encodeURIComponent(cal) + "&heartRate=" + encodeURIComponent(hr) + "&notes=" + encodeURIComponent(notes);
    await fetch(SHEETS_URL + "?" + params, {method:"GET", mode:"no-cors"});
    ["stat-dur-","stat-cal-","stat-hr-"].forEach(function(p){
      var el = document.getElementById(p + dayId); if(el) el.value = "";
    });
    if(cardioEl) cardioEl.value = "";
    if(notesEl) notesEl.value = "";
    markDayComplete(dayId);
    showToast("Workout saved to Sheets");
  }catch(e){ showToast("Failed to save", "var(--accent2)"); }
}

// ── Week utilities ───────────────────────────────────────────
function _isoWeekKey(d){
  var t = new Date(d); t.setHours(0,0,0,0);
  t.setDate(t.getDate() + 3 - (t.getDay()+6)%7);
  var w1 = new Date(t.getFullYear(),0,4);
  var wn = 1 + Math.round(((t-w1)/86400000 - 3 + (w1.getDay()+6)%7)/7);
  return t.getFullYear() + "-W" + String(wn).padStart(2,"0");
}
function getPacificWeekKey(){ return _isoWeekKey(new Date()); }
function getWeekKeyForDate(ds){ if(!ds) return null; var d=new Date(ds); return isNaN(d)?null:_isoWeekKey(d); }
function isThisWeek(ds){ return getWeekKeyForDate(ds) === getPacificWeekKey(); }

function isAdjacentWeek(wk1, wk2){
  var p1 = wk1.split("-W"), p2 = wk2.split("-W");
  var y1 = parseInt(p1[0]), w1 = parseInt(p1[1]);
  var y2 = parseInt(p2[0]), w2 = parseInt(p2[1]);
  return (y2 === y1 && w2 === w1 + 1) || (y2 === y1 + 1 && w2 === 1 && w1 >= 52);
}

function markDayComplete(dayId){
  var data = loadData();
  if(!data.weekDone) data.weekDone = {};
  var weekKey = getPacificWeekKey();
  if(!data.weekDone[weekKey]) data.weekDone[weekKey] = {};
  data.weekDone[weekKey][dayId] = true;
  saveData(data);
  updateDayTabColors();
}

function updateDayTabColors(){
  var data = loadData();
  var weekKey = getPacificWeekKey();
  var done = (data.weekDone && data.weekDone[weekKey]) || {};
  var dayIds = ["d1","d2","d3","d4","d5"];
  var btnArr = [];
  document.querySelectorAll(".day-btn").forEach(function(b){ btnArr.push(b); });
  DAYS.forEach(function(d, i){
    if(dayIds.indexOf(d.id) !== -1 && btnArr[i]){
      if(done[d.id]){ btnArr[i].classList.add("week-done"); }
      else { btnArr[i].classList.remove("week-done"); }
    }
  });
}

// ── Per-exercise progression graph ───────────────────────────
var _exCharts = {};
async function toggleExGraph(exId, exName, linkEl){
  var container = document.getElementById("graph-container-" + exId);
  if(!container) return;
  var isHidden = container.style.display === "none";
  if(!isHidden){
    container.style.display = "none";
    if(linkEl) linkEl.textContent = "Show progression graph";
    if(_exCharts[exId]){ _exCharts[exId].destroy(); delete _exCharts[exId]; }
    return;
  }
  if(linkEl) linkEl.textContent = "Loading...";
  try{
    var resp = await fetch(SHEETS_URL + "?type=history&exercise=" + encodeURIComponent(exName));
    var json = await resp.json();
    if(!json.rows || json.rows.length === 0){
      container.style.display = "block";
      container.innerHTML = "<div class='hist-loading'>Not enough data for a graph yet</div>";
      if(linkEl) linkEl.textContent = "Hide graph";
      return;
    }
    var rows = json.rows;
    var labels = rows.map(function(r){ return fmtDate(r.date); });
    var s1 = rows.map(function(r){ return parseFloat(r.set1)||null; });
    var s2 = rows.map(function(r){ return parseFloat(r.set2)||null; });
    var s3 = rows.map(function(r){ return parseFloat(r.set3)||null; });
    container.style.display = "block";
    container.innerHTML = "<canvas id='graph-canvas-" + exId + "' height='160'></canvas>";
    var canvas = document.getElementById("graph-canvas-" + exId);
    if(_exCharts[exId]){ _exCharts[exId].destroy(); }
    _exCharts[exId] = new Chart(canvas, {
      type:"line",
      data:{
        labels:labels,
        datasets:[
          {label:"Set 1",data:s1,borderColor:"#e8ff47",backgroundColor:"rgba(232,255,71,0.08)",tension:0.3,pointRadius:4,pointBackgroundColor:"#e8ff47",spanGaps:true},
          {label:"Set 2",data:s2,borderColor:"#ff6b35",backgroundColor:"rgba(255,107,53,0.08)",tension:0.3,pointRadius:4,pointBackgroundColor:"#ff6b35",spanGaps:true},
          {label:"Set 3",data:s3,borderColor:"#4caf50",backgroundColor:"rgba(76,175,80,0.08)",tension:0.3,pointRadius:4,pointBackgroundColor:"#4caf50",spanGaps:true}
        ]

          x:{ticks:{color:"#888884",font:{size:9},maxRotation:45},grid:{color:"#2e2e30"}},
          y:{ticks:{color:"#888884",font:{size:9}},grid:{color:"#2e2e30"}}
        }
      }
    });
    if(linkEl) linkEl.textContent = "Hide graph";
  }catch(err){
    container.style.display = "block";
    container.innerHTML = "<div class='hist-loading'>Could not load graph</div>";
    if(linkEl) linkEl.textContent = "Show progression graph";
  }
}

// ── Stats panel (updated with weekly + all-time graphs) ───────
var _weeklyChart = null;
var _allTimeChart = null;
async function loadStats(){
  var weekEl = document.getElementById("stats-week");
  if(!weekEl) return;
  weekEl.innerHTML = "<div style='color:var(--muted);font-size:13px;'>Loading...</div>";
  try{
    var resp = await fetch(SHEETS_URL + "?type=stats_workouts");
    var json = await resp.json();
    var rows = (json && json.rows) ? json.rows : [];

    // ── Weekly summary ──────────────────────────────────────
    var weekRows = rows.filter(function(r){ return isThisWeek(r.date); });
    var totalDur=0, totalCal=0, totalHR=0, hrCnt=0, sessionCnt=weekRows.length;
    weekRows.forEach(function(r){
      if(r.duration && !isNaN(parseFloat(r.duration))) totalDur += parseFloat(r.duration);
      if(r.calories && !isNaN(parseFloat(r.calories))) totalCal += parseFloat(r.calories);
      if(r.heartRate && !isNaN(parseFloat(r.heartRate))){ totalHR += parseFloat(r.heartRate); hrCnt++; }
    });
    var weekKey = getPacificWeekKey();
    var html = "<div class='week-summary-card'>"
      + "<div class='week-summary-row'><span class='week-label'>Week</span><span class='week-val'>" + weekKey + "</span></div>"
      + "<div class='week-summary-row'><span class='week-label'>Sessions</span><span class='week-val'>" + sessionCnt + "</span></div>"
      + (totalDur>0?"<div class='week-summary-row'><span class='week-label'>Total Duration</span><span class='week-val'>"+Math.round(totalDur)+" min</span></div>":"")
      + (totalCal>0?"<div class='week-summary-row'><span class='week-label'>Total Calories</span><span class='week-val'>"+Math.round(totalCal)+"</span></div>":"")
      + (hrCnt>0?"<div class='week-summary-row'><span class='week-label'>Avg Heart Rate</span><span class='week-val'>"+(totalHR/hrCnt).toFixed(0)+" BPM</span></div>":"")
      + "</div>";
    weekEl.innerHTML = html;

    // ── Streak calculation ───────────────────────────────────
    var weekCounts = {};
    rows.forEach(function(r){
      var wk = getWeekKeyForDate(r.date);
      if(wk) weekCounts[wk] = (weekCounts[wk]||0) + 1;
    });
    var allWeeks = Object.keys(weekCounts).sort();
    var qualWeeks = allWeeks.filter(function(w){ return weekCounts[w] >= 3; });
    var bestStreak = 0, runStreak = 0;
    for(var wi = 0; wi < qualWeeks.length; wi++){
      runStreak = (wi === 0 || !isAdjacentWeek(qualWeeks[wi-1], qualWeeks[wi])) ? 1 : runStreak + 1;
      if(runStreak > bestStreak) bestStreak = runStreak;
    }
    var curWk = getPacificWeekKey();
    var currentStreak = 0;
    if(qualWeeks.length > 0){
      var lastQual = qualWeeks[qualWeeks.length - 1];
      if(lastQual === curWk || isAdjacentWeek(lastQual, curWk)){
        currentStreak = runStreak;
      }
    }
    var streakUnit = " wk";
    var curEl = document.getElementById("streak-current");
    var bestEl = document.getElementById("streak-best");
    if(curEl) curEl.textContent = currentStreak + streakUnit;
    if(bestEl) bestEl.textContent = bestStreak + streakUnit;

    // ── Weekly chart — last 10 sessions, duration bars ──────
    var recentRows = rows.slice(-10);
    var wLabels = recentRows.map(function(r){ return fmtDate(r.date).replace(", 2026",""); });
    var wDur = recentRows.map(function(r){ return parseFloat(r.duration)||0; });
    var wCal = recentRows.map(function(r){ return parseFloat(r.calories)||0; });
    var wCanvas = document.getElementById("weeklyChart");
    if(wCanvas){
      if(_weeklyChart){ _weeklyChart.destroy(); }
      _weeklyChart = new Chart(wCanvas,{
        type:"bar",
        data:{
          labels:wLabels,
          datasets:[
            {label:"Duration (min)",data:wDur,backgroundColor:"rgba(232,255,71,0.7)",borderColor:"#e8ff47",borderWidth:1,yAxisID:"y"},
            {label:"Calories",data:wCal,backgroundColor:"rgba(255,107,53,0.5)",borderColor:"#ff6b35",borderWidth:1,yAxisID:"y1"}
          ]
        },
        options:{
          responsive:true,
          plugins:{legend:{labels:{color:"#888884",font:{size:10}}}},
          scales:{
            x:{ticks:{color:"#888884",font:{size:9},maxRotation:45},grid:{color:"#2e2e30"}},
            y:{ticks:{color:"#888884",font:{size:9}},grid:{color:"#2e2e30"},title:{display:true,text:"min",color:"#888884",font:{size:9}}},
            y1:{position:"right",ticks:{color:"#888884",font:{size:9}},grid:{drawOnChartArea:false},title:{display:true,text:"cal",color:"#888884",font:{size:9}}}
          }
        }
      });
    }

    // ── All-time chart — rolling avg HR line ─────────────────
    var hrRows = rows.filter(function(r){ return r.heartRate && !isNaN(parseFloat(r.heartRate)); });
    var atLabels = hrRows.map(function(r){ return fmtDate(r.date).replace(", 2026",""); });
    var atHR = hrRows.map(function(r){ return parseFloat(r.heartRate); });
    var atDur = hrRows.map(function(r){ return parseFloat(r.duration)||null; });
    var atCanvas = document.getElementById("allTimeChart");
    if(atCanvas && hrRows.length > 0){
      if(_allTimeChart){ _allTimeChart.destroy(); }
      _allTimeChart = new Chart(atCanvas,{
        type:"line",
        data:{
          labels:atLabels,
          datasets:[
            {label:"Avg HR (BPM)",data:atHR,borderColor:"#e8ff47",backgroundColor:"rgba(232,255,71,0.08)",tension:0.3,pointRadius:3,pointBackgroundColor:"#e8ff47",yAxisID:"y"},
            {label:"Duration (min)",data:atDur,borderColor:"#4caf50",backgroundColor:"rgba(76,175,80,0.08)",tension:0.3,pointRadius:3,pointBackgroundColor:"#4caf50",spanGaps:true,yAxisID:"y1"}
          ]
        },
        options:{
          responsive:true,
          plugins:{legend:{labels:{color:"#888884",font:{size:10}}}},
          scales:{
            x:{ticks:{color:"#888884",font:{size:9},maxRotation:45},grid:{color:"#2e2e30"}},
            y:{ticks:{color:"#888884",font:{size:9}},grid:{color:"#2e2e30"},title:{display:true,text:"BPM",color:"#888884",font:{size:9}}},
            y1:{position:"right",ticks:{color:"#888884",font:{size:9}},grid:{drawOnChartArea:false},title:{display:true,text:"min",color:"#888884",font:{size:9}}}
          }
        }
      });
    } else if(atCanvas){
      atCanvas.parentElement.innerHTML = "<div style='color:var(--muted);font-size:13px;padding:10px 0;'>Log more workouts with HR data to see this graph.</div>";
    }

  }catch(err){
    if(weekEl) weekEl.innerHTML = "<div style='color:var(--muted);font-size:13px;'>Could not load stats.</div>";
  }
}


// ── Cardio pill toggle ────────────────────────────────────────
function toggleCardioPill(btn, inputId, value){
  var inp = document.getElementById(inputId);
  var isActive = btn.classList.contains("active");
  btn.closest(".cardio-pills").querySelectorAll(".cardio-pill").forEach(function(p){ p.classList.remove("active"); });
  if(!isActive){
    btn.classList.add("active");
    if(inp) inp.value = value;
  } else {
    if(inp) inp.value = "";
  }
}

// ── Tab navigation ───────────────────────────────────────────
var WORKOUT_DAYS = ["d1","d2","d3","d4","d5"];
function showDay(id){
  document.querySelectorAll(".day-panel").forEach(function(p){ p.classList.remove("active"); });
  document.querySelectorAll(".day-btn").forEach(function(b){ b.classList.remove("active"); });
  var panel = document.getElementById(id);
  if(panel) panel.classList.add("active");
  DAYS.forEach(function(d, i){
    if(d.id === id){
      var btns = document.querySelectorAll(".day-btn");
      if(btns[i]) btns[i].classList.add("active");
    }
  });
  window.scrollTo(0, 0);
  try{ localStorage.setItem("pgymplan_lastday", id); }catch(e){}
  if(WORKOUT_DAYS.indexOf(id) !== -1){
    var dayObj = null;
    DAYS.forEach(function(d){ if(d.id === id) dayObj = d; });
    if(dayObj){
      loadDayHistory(id, dayObj.title);
      loadCardioHistory(id);
    }
  }
  if(id === "stats") loadStats();
}

buildNav();
buildPanels();
renderAll();
updateDayTabColors();
(function(){
  try{
    var lastDay = localStorage.getItem("pgymplan_lastday");
    if(lastDay && document.getElementById(lastDay)) showDay(lastDay);
    else showDay("d1");
  }catch(e){ showDay("d1"); }
})();
