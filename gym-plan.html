<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Peter's Gym Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   TRAINING MANUAL — Design System
   Barlow Condensed · DM Sans · DM Mono
   Warm paper · ink · single red accent
   ═══════════════════════════════════════════════════ */
:root{
  --bg:#F0EDE6;--surface:#EAE6DC;--surface2:#E0DCD1;
  --ink:#19181A;--muted:#948F88;--border:#C4BFB6;--border-strong:#A09B92;
  --red:#C42B1C;--red-dim:rgba(196,43,28,0.08);
  --green:#2A5E44;--green-dim:rgba(42,94,68,0.10);
  --amber:#B86F00;--amber-dim:rgba(184,111,0,0.10);
  --white:#FAF8F3;--deload:#B86000;
  /* Backward-compat aliases so all inline var() refs auto-update */
  --accent:var(--red);--accent2:var(--amber);--text:var(--ink);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.5;max-width:480px;margin:0 auto;padding-bottom:80px;}

/* ── Header ─────────────────────────────────────── */
header{padding:14px 20px 12px;border-bottom:2px solid var(--ink);}
header h1{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--ink);line-height:1;}
header p{color:var(--muted);font-size:10px;margin-top:2px;letter-spacing:1.5px;text-transform:uppercase;}

/* ── Week nav ────────────────────────────────────── */
.week-nav-row{display:flex;align-items:stretch;padding:0;background:var(--bg);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);}
.day-pills{display:flex;flex:1;}
.nav-arrow{background:var(--surface);border:none;border-right:1px solid var(--border);color:var(--muted);width:30px;min-width:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;transition:color .15s;}
.nav-arrow:last-child{border-right:none;border-left:1px solid var(--border);}
.nav-arrow:active{opacity:.6;}
.day-pill{background:transparent;border:none;border-right:1px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;padding:7px 2px 5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;min-width:0;position:relative;transition:background .1s,color .1s;}
.day-pill:last-of-type{border-right:none;}
.day-pill-label{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:inherit;}
.day-pill-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}
.day-pill-opt{font-family:'DM Sans',sans-serif;font-size:8px;color:var(--muted);font-style:italic;}
.day-pill.today::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--red);}
.day-pill.active{background:var(--red);color:white;}
.day-pill.active .day-pill-date,.day-pill.active .day-pill-opt{color:rgba(255,255,255,.6);}
.day-pill.active.today::after{display:none;}
.day-pill.optional{/* shown via "opt" sub-label only */}
.day-pill.rest{opacity:.3;cursor:default;pointer-events:none;}
.day-pill.week-done{color:var(--green);}
.day-pill.week-done::before{content:'✓';position:absolute;top:1px;right:3px;font-size:9px;font-weight:700;color:var(--green);font-family:'DM Sans',sans-serif;}
.day-pill.week-done.active{background:var(--green);color:white;}
.day-pill.week-done.active::before{color:rgba(255,255,255,.85);}
.day-pill.is-deload{color:var(--deload);}
.day-pill.is-deload.active{background:var(--deload);color:white;}

/* ── Secondary nav ────────────────────────────────── */
.secondary-nav-row{display:flex;padding:0;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.secondary-nav-row::-webkit-scrollbar{display:none;}
.day-btn{flex:1;background:none;border:none;border-right:1px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:6px 8px;cursor:pointer;white-space:nowrap;transition:background .1s,color .1s;}
.day-btn:last-child{border-right:none;}
.day-btn.active{background:var(--ink);color:var(--bg);}
.day-btn.week-done{color:var(--green);}
.day-btn.week-done.active{background:var(--green);color:white;}

/* ── Day panels ───────────────────────────────────── */
.day-panel{display:none;padding:22px 20px;}
.day-panel.active{display:block;}
.day-label{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:800;letter-spacing:2px;line-height:1;text-transform:uppercase;}
.day-subtitle{color:var(--muted);font-size:12px;margin-top:4px;letter-spacing:.5px;}
.skip-note{background:var(--surface);border-left:3px solid var(--amber);padding:8px 12px;border-radius:0 3px 3px 0;font-size:12px;color:var(--muted);margin-top:10px;}

/* ── Phase strip ──────────────────────────────────── */
.phase-strip{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.phase-strip.deload{border-top-color:var(--deload);}
.phase-day{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink);}
.phase-info{font-size:10px;color:var(--muted);margin-top:1px;letter-spacing:.5px;}
.phase-info.deload{color:var(--deload);}
.phase-scheme{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);margin-top:2px;font-weight:500;}

/* ── Section labels ───────────────────────────────── */
.section-label{display:flex;align-items:center;gap:8px;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin:22px 0 10px;}
.section-label::before{content:'';display:block;width:3px;height:10px;background:var(--red);flex-shrink:0;border-radius:1px;}

/* ── Exercise cards ───────────────────────────────── */
.exercise{background:var(--white);border:1px solid var(--border);border-radius:3px;margin-bottom:6px;overflow:hidden;transition:border-color .2s,opacity .2s;}
.exercise.done{border-color:var(--green);opacity:.7;}
.exercise-main{display:flex;align-items:center;padding:12px;gap:10px;}
.check-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border-strong);background:var(--bg);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;color:transparent;}
.check-btn.done{background:var(--green);border-color:var(--green);color:white;}
.set-check-btn{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-strong);background:var(--bg);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;color:transparent;}
.set-check-btn.done{background:var(--green);border-color:var(--green);color:white;}
.set-checks{display:flex;align-items:center;gap:12px;padding:8px 12px 10px;border-top:1px solid var(--border);background:var(--surface);}
.set-check-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.set-check-lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.exercise-info{flex:1;min-width:0;}
.exercise-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;letter-spacing:.5px;color:var(--ink);line-height:1.2;}
.exercise-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap;}
.exercise-sets{font-family:'DM Mono',monospace;font-weight:500;color:var(--red);font-size:11px;}
.prev-weight{font-family:'DM Mono',monospace;font-size:10px;color:var(--amber);}
.info-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Mono',monospace;transition:all .15s;}
.info-btn.open{background:var(--ink);border-color:var(--ink);color:var(--bg);}
.edit-entry-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:2px;cursor:pointer;letter-spacing:.5px;}
.exercise-detail{display:none;padding:0 12px 14px;border-top:1px solid var(--border);background:var(--surface);}
.exercise-detail.open{display:block;}
.tip-text{font-size:12px;color:var(--muted);margin-top:12px;line-height:1.65;}
.tip-text strong{color:var(--ink);font-weight:600;}

/* ── Weight logging ───────────────────────────────── */
.weight-section{margin-top:14px;}
.weight-label{font-family:'DM Mono',monospace;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.sets-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;}
.set-col{display:flex;flex-direction:column;gap:4px;}
.set-col-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);font-weight:700;letter-spacing:2px;text-transform:uppercase;text-align:center;}
.weight-input{background:var(--white);border:1px solid var(--border);border-radius:2px;color:var(--ink);font-family:'DM Mono',monospace;font-size:16px;font-weight:500;padding:10px 6px;width:100%;outline:none;transition:border-color .15s;text-align:center;}
.weight-input:focus{border-color:var(--red);border-width:2px;}
.weight-input::placeholder{color:var(--muted);font-weight:400;font-style:italic;}
.save-btn{background:var(--ink);border:none;color:var(--bg);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:11px 16px;border-radius:2px;cursor:pointer;width:100%;margin-top:4px;transition:opacity .15s;}
.save-btn:active{opacity:.75;}
.saved-msg{font-family:'DM Mono',monospace;font-size:11px;color:var(--green);margin-top:6px;display:none;text-align:center;letter-spacing:1px;}
.hist-loading{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding:4px 0;}
.history-list{margin-top:8px;border:1px solid var(--border);border-radius:2px;overflow:hidden;}
.history-entry{font-size:12px;padding:7px 10px;border-bottom:1px solid var(--border);background:var(--white);}
.history-entry:last-child{border-bottom:none;}
.h-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.h-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;}
.h-sets{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);font-weight:500;}

/* ── Warmup block ─────────────────────────────────── */
.warmup-block{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:12px 14px;margin-bottom:6px;}
.warmup-block .w-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;color:var(--amber);}
.warmup-item{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding:2px 0;}

/* ── Finisher ─────────────────────────────────────── */
.finisher{background:var(--red);border:none;border-radius:3px;padding:16px;margin-top:20px;color:white;}
.finisher-title{font-family:'Barlow Condensed',sans-serif;font-size:1.25rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:white;margin-bottom:6px;}
.finisher-detail{font-size:12px;color:rgba(255,255,255,.82);line-height:1.5;}
.finisher-detail strong{color:white;}
.finisher.done{background:var(--green);}
/* Elements inside finisher — on red/green bg */
.finisher .check-btn{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.45);color:transparent;}
.finisher .check-btn.done{background:white;border-color:white;color:var(--red);}
.finisher.done .check-btn.done{color:var(--green);}
.finisher .cardio-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.88);}
.finisher .cardio-pill.active{background:white;color:var(--red);border-color:white;}
.finisher .stat-input{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:white;}
.finisher .stat-input::placeholder{color:rgba(255,255,255,.5);font-size:11px;}
.finisher .stat-input:focus{border-color:white;}
.finisher .stat-col-label{color:rgba(255,255,255,.65);}
.finisher .hist-block{background:rgba(0,0,0,.12);border:1px solid rgba(255,255,255,.15);}
.finisher .hist-block-title{color:rgba(255,255,255,.65);}
.finisher .hist-loading{color:rgba(255,255,255,.55);}

/* ── Cardio done btn (legacy shape — now on red bg) ── */
.cardio-done-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.4);color:rgba(255,255,255,.9);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;border-radius:2px;cursor:pointer;transition:all .15s;}
.cardio-done-btn.done{background:white;color:var(--red);border-color:white;}

/* ── Cardio type pills (activity log — light bg) ───── */
.cardio-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.cardio-pill{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;padding:5px 11px;border-radius:2px;cursor:pointer;transition:all .15s;}
.cardio-pill.active{background:var(--ink);color:var(--bg);border-color:var(--ink);}

/* ── History block ────────────────────────────────── */
.hist-block{margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:12px 14px;}
.hist-block-title{font-family:'DM Mono',monospace;font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.load-link{background:none;border:none;color:var(--red);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;padding:0;text-decoration:underline;}

/* ── Stats / wrap-up block ────────────────────────── */
.stats-block{margin-top:20px;background:var(--white);border:1px solid var(--border);border-radius:3px;padding:16px;}
.stats-title{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink);margin-bottom:12px;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.stat-col{display:flex;flex-direction:column;gap:4px;}
.stat-col-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);font-weight:700;letter-spacing:2px;text-transform:uppercase;text-align:center;}
.stat-input{background:var(--bg);border:1px solid var(--border);border-radius:2px;color:var(--ink);font-family:'DM Mono',monospace;font-size:14px;font-weight:500;padding:8px 6px;width:100%;outline:none;transition:border-color .15s;text-align:center;}
.stat-input:focus{border-color:var(--red);}
.stat-input::placeholder{color:var(--border-strong);font-weight:400;font-size:11px;}
.stats-save-btn{background:var(--red);border:none;color:white;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:11px 16px;border-radius:2px;cursor:pointer;width:100%;transition:opacity .15s;}
.stats-save-btn:active{opacity:.8;}
.notes-block{margin-top:14px;}
.notes-label{font-family:'DM Mono',monospace;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.notes-textarea{background:var(--bg);border:1px solid var(--border);border-radius:2px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 12px;width:100%;outline:none;resize:none;min-height:80px;line-height:1.6;transition:border-color .15s;}
.notes-textarea:focus{border-color:var(--red);}
.notes-textarea::placeholder{color:var(--muted);}
.reset-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:8px 16px;border-radius:2px;cursor:pointer;margin-top:14px;display:block;width:100%;text-align:center;letter-spacing:1px;}

/* ── Toast ────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;padding:10px 20px;border-radius:2px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}

/* ── Cards ────────────────────────────────────────── */
.week-summary-card,.stat-summary-card,.ex-prog-card,.pr-card{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:14px;margin-bottom:8px;}
.week-summary-row,.stat-summary-row,.pr-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);}
.week-summary-row:last-child,.stat-summary-row:last-child,.pr-row:last-child{border-bottom:none;}
.week-label,.stat-summary-label,.pr-name{color:var(--muted);}
.week-val,.stat-summary-val,.pr-val{font-family:'DM Mono',monospace;font-weight:500;color:var(--ink);}

/* ── Streak ───────────────────────────────────────── */
.streak-card{background:var(--white);border:1px solid var(--border);border-radius:3px;margin-bottom:8px;display:flex;overflow:hidden;padding:0;}
.streak-col{flex:1;text-align:center;padding:16px 10px;border-right:1px solid var(--border);}
.streak-col:last-child{border-right:none;}
.streak-num{font-family:'Barlow Condensed',sans-serif;font-size:3rem;font-weight:800;color:var(--ink);line-height:1;}
.streak-label{font-family:'DM Mono',monospace;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* ── Graphs ───────────────────────────────────────── */
.graph-container{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:14px;margin-top:8px;}
.graph-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;color:var(--ink);}
.show-graph-link{background:none;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;padding:6px 0 0;text-decoration:underline;display:block;letter-spacing:1px;}
.overload-nudge{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink);font-weight:500;margin-top:8px;padding:8px 10px;background:var(--red-dim);border-radius:2px;border-left:3px solid var(--red);}

/* ── Macros ───────────────────────────────────────── */
.macro-card{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:16px;margin-bottom:8px;}
.macro-name{font-family:'DM Mono',monospace;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.macro-amount{font-family:'Barlow Condensed',sans-serif;font-size:2.6rem;font-weight:800;color:var(--ink);line-height:1;}
.macro-note{font-size:11px;color:var(--muted);margin-top:4px;}
.callout{background:var(--surface);border-left:3px solid var(--amber);padding:12px 14px;border-radius:0 3px 3px 0;font-size:12px;color:var(--muted);margin:10px 0;line-height:1.8;}
.callout strong{color:var(--ink);}

/* ── Alt items / refs ─────────────────────────────── */
.alt-item{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:11px 14px;margin-bottom:7px;}
.alt-name{font-weight:600;font-size:14px;margin-bottom:2px;}
.alt-note{font-size:12px;color:var(--muted);}
.ref-link{display:inline-block;margin-top:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--red);text-decoration:none;}

/* ── Recovery tab ─────────────────────────────────── */
.recovery-section{margin-bottom:22px;}
.recovery-section-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.recovery-card{background:var(--white);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:0 3px 3px 0;padding:14px 16px;margin-bottom:8px;}
.recovery-card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink);margin-bottom:3px;}
.recovery-card-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;}
.recovery-card-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px;}
.recovery-watch{display:inline-block;font-family:'DM Mono',monospace;font-size:11px;color:var(--red);text-decoration:none;border:1px solid var(--red);border-radius:2px;padding:3px 8px;}
.recovery-watch:hover{background:var(--red);color:#fff;}

/* ── Stats section misc ───────────────────────────── */
.ex-prog-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.ex-prog-entries{display:flex;flex-direction:column;gap:4px;}
.ex-prog-entry{display:flex;justify-content:space-between;font-size:11px;}
.ex-prog-date{font-family:'DM Mono',monospace;color:var(--muted);}
.ex-prog-sets{font-family:'DM Mono',monospace;color:var(--red);font-weight:500;}

/* ── Heatmap ──────────────────────────────────────── */
.heatmap-period-pills{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.heatmap-period-pill{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:4px 10px;border-radius:2px;cursor:pointer;letter-spacing:1px;}
.heatmap-period-pill.active{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.heatmap-grid{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px;}
.heatmap-day{width:14px;height:14px;border-radius:2px;background:var(--surface2);border:1px solid var(--border);}
.heatmap-day.active{background:var(--red);border-color:var(--red);}
.heatmap-day.activity{background:var(--amber);border-color:var(--amber);}
.heatmap-labels{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;}

/* ── Activity entries ─────────────────────────────── */
.activity-entry{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:11px 14px;margin-bottom:8px;}
.activity-entry-top{display:flex;justify-content:space-between;align-items:center;}
.activity-entry-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.5px;text-transform:uppercase;}
.activity-entry-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.activity-entry-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px;}

/* ── Banners ──────────────────────────────────────── */
.deload-banner{background:rgba(184,96,0,.08);border:1px solid var(--deload);border-radius:3px;padding:10px 14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--deload);margin-bottom:14px;}
.week-banner{background:var(--surface);border-left:3px solid var(--amber);padding:8px 12px;border-radius:0 3px 3px 0;font-size:12px;color:var(--muted);margin-bottom:12px;}
.band-pull-callout{background:var(--red-dim);border-left:3px solid var(--red);padding:8px 12px;border-radius:0 3px 3px 0;font-size:12px;color:var(--ink);font-weight:500;margin-bottom:14px;}

/* ── Rest screen ──────────────────────────────────── */
.rest-screen{padding:56px 24px;text-align:center;display:none;}
.rest-screen-title{font-family:'Barlow Condensed',sans-serif;font-size:3rem;font-weight:800;color:var(--border-strong);letter-spacing:4px;text-transform:uppercase;}
.rest-screen-note{font-size:13px;color:var(--muted);margin-top:12px;line-height:1.7;}
.rest-screen-next{margin-top:24px;font-family:'DM Mono',monospace;font-size:12px;color:var(--red);cursor:pointer;background:none;border:none;text-decoration:underline;letter-spacing:1px;}

/* ── HR zones ─────────────────────────────────────── */
.hr-zone{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
.hr-zone:last-child{border-bottom:none;}
.zone-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

// ── Program schedule ──────────────────────────────────────────
var PROGRAM_START = new Date('2026-04-07T00:00:00');

};

// 1-based week numbers from PROGRAM_START. end:999 = open-ended.
var SCHEDULE_WEEKS = [
  { start:1,  end:6,   phase:'accumulation'    },
  { start:7,  end:7,   phase:'deload'           },
  { start:8,  end:13,  phase:'intensification'  },
  { start:14, end:14,  phase:'deload'           },
  { start:15, end:20,  phase:'accumulation'     },
  { start:21, end:21,  phase:'deload'           },
  { start:22, end:999, phase:'intensification'  }
];

// Dates that override normal training with rest (YYYY-MM-DD)
var EXCEPTION_DATES = {
  '2026-04-27': { rest:true, note:'Unavailable \u2014 adjusted schedule this week' },
  '2026-04-28': { rest:true, note:'Unavailable \u2014 adjusted schedule this week' },
  '2026-04-29': { rest:true, note:'Unavailable \u2014 adjusted schedule this week' },
  '2026-07-13': { rest:true, note:'Extended rest \u2014 resume Jul 21' },
  '2026-07-14': { rest:true, note:'Extended rest \u2014 resume Jul 21' },
  '2026-07-15': { rest:true, note:'Extended rest \u2014 resume Jul 21' },

  '2026-07-17': { rest:true, note:'Extended rest \u2014 resume Jul 21' },
  '2026-08-14': { rest:true, note:'Unavailable today' }
};

// Keyed by the Monday of that calendar week (YYYY-MM-DD)
var WEEK_BANNERS = {
  '2026-04-27': 'Abbreviated week \u2014 Mon/Tue/Wed unavailable. Thu: Legs + Glutes \xb7 Fri: Upper (Push/Pull).',
  '2026-08-10': 'Note: Fri Aug 14 is a rest day this week \u2014 no Arms session.'
};

// Maps JS day-of-week (1=Mon...5=Fri) to workout panel ID
var DOW_TO_PANEL = { 1:'d1', 2:'d2', 3:'d3', 4:'d4', 5:'d5' };

// Keyed by Monday of that calendar week (YYYY-MM-DD)
// { dayIndex(0=Mon..4=Fri): panelId } — overrides which workout shows on that day
var WEEK_DOW_OVERRIDES = {
  '2026-04-27': { 3:'d3', 4:'d4' }  // Thu: Legs+Glutes, Fri: Upper (abbreviated week — skip Arms)
};

// ── Schedule logic ────────────────────────────────────────────
function toDateKey(date){
  var d = new Date(date);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getMondayOf(date){
  var d = new Date(date); d.setHours(0,0,0,0);
  var dow = d.getDay();
  d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
  return d;
}

function getWeekNum(date){
  var d = new Date(date); d.setHours(0,0,0,0);
  var s = new Date(PROGRAM_START); s.setHours(0,0,0,0);
  var diff = Math.floor((d - s) / 86400000);
  return diff < 0 ? null : Math.floor(diff / 7) + 1;
}

function getProgramState(date){
  var d = new Date(date); d.setHours(0,0,0,0);
  var dow = d.getDay();
  var s = new Date(PROGRAM_START); s.setHours(0,0,0,0);

  if(d < s){
    return { preProgram:true, isRest:true, restNote:'Program starts Apr 7, 2026',
             dayOfWeek:dow, isOptional:false, panelId:null, weekNum:0,
             phase:'accumulation', phaseName:'', weekInPhase:0, phaseLength:0,
             isDeload:false, repScheme:'', banner:null, dayName:'', workoutType:'' };
  }

  var weekNum = getWeekNum(d);
  var isWeekend = dow === 0 || dow === 6;
  var dateKey = toDateKey(d);
  var exception = EXCEPTION_DATES[dateKey] || null;
  var isRest = isWeekend || !!(exception && exception.rest);
  var restNote = exception ? exception.note : (isWeekend ? 'Rest day \u2014 recovery is part of the program.' : null);

  var phaseKey = 'accumulation', phaseBlock = SCHEDULE_WEEKS[0];
  for(var i=0; i<SCHEDULE_WEEKS.length; i++){
    if(weekNum >= SCHEDULE_WEEKS[i].start && weekNum <= SCHEDULE_WEEKS[i].end){
      phaseKey = SCHEDULE_WEEKS[i].phase; phaseBlock = SCHEDULE_WEEKS[i]; break;
    }
  }
  var weekInPhase = weekNum - phaseBlock.start + 1;
  var phaseLength = phaseBlock.end >= 999 ? null : (phaseBlock.end - phaseBlock.start + 1);

  var monday = getMondayOf(d);
  var banner = WEEK_BANNERS[toDateKey(monday)] || null;

  var repScheme;
  if(phaseKey === 'deload')               repScheme = '2 \xd7 10-12 all exercises \xb7 reduce load ~40%';
  else if(phaseKey === 'intensification') repScheme = '4-5 \xd7 5-6 compounds \xb7 3 \xd7 8-10 accessories';
  else                                    repScheme = '3 \xd7 10-12 compounds \xb7 3 \xd7 12-15 isolation';

  var dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var workoutNames = {1:'Push', 2:'Pull', 3:'Legs + Glutes', 4:'Upper', 5:'Arms (Optional)'};
  var panelWorkoutNames = { d1:'Push', d2:'Pull', d3:'Legs + Glutes', d4:'Upper', d5:'Arms (Optional)' };

  var mondayKey = toDateKey(monday);
  var weekOverride = WEEK_DOW_OVERRIDES[mondayKey] || {};
  var dowIndex = dow - 1; // 0=Mon..4=Fri
  var panelId = (weekOverride[dowIndex] !== undefined) ? weekOverride[dowIndex] : (DOW_TO_PANEL[dow] || null);

  return {
    preProgram:false, weekNum:weekNum, phase:phaseKey,
    phaseName:PHASES[phaseKey].name, weekInPhase:weekInPhase, phaseLength:phaseLength,
    isRest:isRest, restNote:restNote, banner:banner, isDeload:phaseKey==='deload',
    repScheme:repScheme, dayOfWeek:dow, isOptional:dow===5,
    panelId:panelId,
    dayName:dayNames[dow], workoutType:(panelId ? (panelWorkoutNames[panelId] || workoutNames[dow] || '') : (workoutNames[dow] || ''))
  };
}

function getSetsForExercise(ex, phase){
  if(ex.fixedSets) return { display:ex.fixedSets };
  if(ex.noWeight){
    var s = phase === 'deload' ? 2 : 3;
    if(ex.setsFormat === 'rounds') return { display:s+' rounds' };
    return { display:s+' \xd7 '+(ex.coreSets||'') };
  }
  if(phase === 'deload')          return { display:'2 \xd7 10-12' };
  if(phase === 'intensification') return { display:(ex.type==='compound'?'4-5 \xd7 5-6':'3 \xd7 8-10') };
  return { display:(ex.type==='compound'?'3 \xd7 10-12':'3 \xd7 12-15') };
}

function getExerciseName(ex, phase){
  if(ex.nameByPhase) return ex.nameByPhase[phase] || ex.nameByPhase.accumulation || ex.name;
  return ex.name;
}

function findExercise(exId){
  var found = null;
  Object.keys(EXERCISES).forEach(function(did){
    Object.keys(EXERCISES[did]).forEach(function(sk){
      EXERCISES[did][sk].forEach(function(ex){ if(ex.id===exId) found=ex; });
    });
  });
  return found;
}

function updateSetsDisplay(panelId, phase){
  var panel = document.getElementById(panelId);
  if(!panel) return;
  panel.querySelectorAll('.exercise-sets[data-ex-id]').forEach(function(span){
    var ex = findExercise(span.dataset.exId);
    if(ex) span.textContent = getSetsForExercise(ex, phase).display;
  });
  panel.querySelectorAll('.exercise-name[data-ex-id]').forEach(function(el){
    var ex = findExercise(el.dataset.exId);
    if(ex && ex.nameByPhase) el.textContent = getExerciseName(ex, phase);
  });
}

var viewedDate = new Date();

// ── Storage ──────────────────────────────────────────────────
var LS_KEY = "pgymplan_v5";
function loadData(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch(e){ return {}; } }
function saveData(d){ localStorage.setItem(LS_KEY, JSON.stringify(d)); }
function clearStaleChecks(){
  var data = loadData();
  var curWeek = getPacificWeekKey();
  if(!data.checksWeekKey || data.checksWeekKey !== curWeek){
    data.checks = {};
    data.setBChecks = {};
    data.warmupChecks = {};
  }
  data.checksWeekKey = curWeek;
  saveData(data);
}

// ── Pending sync queue ────────────────────────────────────────
var PENDING_KEY = "pgymplan_pending_v1";
function loadPending(){ try{ return JSON.parse(localStorage.getItem(PENDING_KEY))||[]; }catch(e){ return []; } }
function savePending(q){ try{ localStorage.setItem(PENDING_KEY, JSON.stringify(q)); }catch(e){} }
function queuePending(params){
  var q = loadPending();
  q.push({params:params, ts:Date.now()});
  savePending(q);
}
function dequeuePending(params){
  savePending(loadPending().filter(function(item){ return item.params !== params; }));
}
function updatePendingIndicator(){
  var q = loadPending();
  var el = document.getElementById("pending-sync-badge");
  if(el){ el.style.display = q.length > 0 ? "block" : "none"; el.textContent = q.length + " exercise(s) pending sync"; }
}
async function flushPending(){
  var q = loadPending();
  if(q.length === 0) return;
  var remaining = [];
  for(var i=0; i<q.length; i++){
    try{
      await fetch(SHEETS_URL + "?" + q[i].params, {method:"GET", mode:"no-cors"});
    }catch(e){
      remaining.push(q[i]);
    }
  }
  savePending(remaining);
  updatePendingIndicator();
}

// ── Toast ────────────────────────────────────────────────────
var _toastTimer;
function showToast(msg, color){
  clearTimeout(_toastTimer);
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = color || "var(--green)";
  t.classList.add("show");
  _toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 2500);
}

// ── Date format ──────────────────────────────────────────────
function fmtDate(val){
  if(!val) return "";
  var d = new Date(val);
  if(isNaN(d.getTime())) return String(val);
  return d.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
}

function renderWeekNav(){
  var nav = document.getElementById('dayNav');
  nav.textContent = ''; // clear safely

  var prevBtn = document.createElement('button');
  prevBtn.className = 'nav-arrow';
  prevBtn.textContent = '\u2039';
  prevBtn.setAttribute('aria-label','Previous week');
  prevBtn.onclick = function(){ shiftWeek(-1); };
  nav.appendChild(prevBtn);

  var pillsDiv = document.createElement('div');
  pillsDiv.className = 'day-pills';
  nav.appendChild(pillsDiv);

  var nextBtn = document.createElement('button');
  nextBtn.className = 'nav-arrow';
  nextBtn.textContent = '\u203a';
  nextBtn.setAttribute('aria-label','Next week');
  nextBtn.onclick = function(){ shiftWeek(1); };
  nav.appendChild(nextBtn);

  var monday = getMondayOf(viewedDate);
  var todayKey = toDateKey(new Date());
  var labels = ['Mon','Tue','Wed','Thu','Fri'];
  var panelIds = ['d1','d2','d3','d4','d5'];
  var data = loadData();
  var mondayKey = toDateKey(monday);
  var weekOverride = WEEK_DOW_OVERRIDES[mondayKey] || {};
  var overrideWorkoutLabels = { d1:'Push', d2:'Pull', d3:'Legs', d4:'Upper', d5:'Arms' };

  for(var i=0; i<5; i++){
    var dayDate = new Date(monday); dayDate.setDate(monday.getDate()+i);
    var dateKey = toDateKey(dayDate);
    var exception = EXCEPTION_DATES[dateKey];
    var isRestDay = !!(exception && exception.rest);
    var isFriday = i === 4;
    var isToday = dateKey === todayKey;
    var weekKey = _isoWeekKey(dayDate);
    var actualPanelId = (weekOverride[i] !== undefined) ? weekOverride[i] : panelIds[i];
    var isDone = !!(data.weekDone && data.weekDone[weekKey] && data.weekDone[weekKey][actualPanelId]);
    var dayState = getProgramState(dayDate);

    var btn = document.createElement('button');
    var cls = 'day-pill';
    if(isFriday && weekOverride[4] === undefined) cls += ' optional';
    if(isRestDay) cls += ' rest';
    if(isToday)   cls += ' today';
    if(isDone && !isRestDay) cls += ' week-done';
    if(dayState.isDeload && !isRestDay) cls += ' is-deload';
    btn.className = cls;

    var lbl = document.createElement('div');
    lbl.className = 'day-pill-label';
    lbl.textContent = labels[i];

    var dt = document.createElement('div');
    dt.className = 'day-pill-date';
    dt.textContent = (dayDate.getMonth()+1)+'/'+dayDate.getDate();

    btn.appendChild(lbl);
    btn.appendChild(dt);

    if(weekOverride[i] !== undefined && !isRestDay){
      var wlbl = document.createElement('div');
      wlbl.className = 'day-pill-opt';
      wlbl.textContent = overrideWorkoutLabels[actualPanelId] || '';
      btn.appendChild(wlbl);
    } else if(isFriday){
      var opt = document.createElement('div');
      opt.className = 'day-pill-opt';
      opt.textContent = 'opt';
      btn.appendChild(opt);
    }

    btn.onclick = (function(pid, dd){ return function(){ showDayForDate(pid, dd); }; })(actualPanelId, dayDate);
    pillsDiv.appendChild(btn);
  }
}

function shiftWeek(delta){
  viewedDate = new Date(viewedDate);
  viewedDate.setDate(viewedDate.getDate() + delta*7);

  var monday = getMondayOf(viewedDate);
  showDayForDate('d1', monday);
}

// ── Weight suggestion from history (phase-aware) ──────────────
// Uses Epley 1RM estimate when crossing a phase boundary so the
// suggested weight is calibrated to the new rep range, not the old one.
function computeWeightSuggestion(history, phase, exType){
  if(!history || history.length === 0) return null;
  var recent = history.slice(-3);
  var maxWeights = recent.map(function(e){
    var m = 0;
    [e.s1,e.s2,e.s3].forEach(function(v){ var n=parseFloat(v); if(!isNaN(n)&&n>m) m=n; });
    return m;
  }).filter(function(w){ return w > 0; });
  if(maxWeights.length === 0) return null;
  var lastMax = maxWeights[maxWeights.length-1];
  var prevMax = maxWeights.length >= 2 ? maxWeights[maxWeights.length-2] : null;
  var trending = prevMax !== null && lastMax > prevMax;
  var avgMax = maxWeights.reduce(function(a,b){ return a+b; },0) / maxWeights.length;

  var suggested, note;

  if(phase === 'intensification'){
    // Estimate 1RM assuming history was logged in accumulation (10-12 rep range)
    var srcReps = (exType === 'compound') ? 11 : 13;
    var oneRM = avgMax * (1 + srcReps / 30);
    // Back-calculate for intensification target reps
    var tgtReps = (exType === 'compound') ? 5.5 : 9;
    suggested = oneRM / (1 + tgtReps / 30);
    suggested = Math.round(suggested / 2.5) * 2.5;
    note = 'est. 1RM ' + Math.round(oneRM) + ' lbs \u2192 intensification target';
  } else if(phase === 'deload'){
    // Deload: 60% of estimated 1RM
    var srcReps2 = (exType === 'compound') ? 11 : 13;
    var oneRM2 = avgMax * (1 + srcReps2 / 30);
    suggested = Math.round((oneRM2 * 0.60) / 2.5) * 2.5;
    note = '\u224060% of est. 1RM \u2014 deload week';
  } else {
    // Accumulation: simple trend-based microload
    suggested = trending ? lastMax : Math.max(lastMax - 2.5, lastMax * 0.95);
    suggested = Math.round(suggested / 2.5) * 2.5;
    note = null;
  }

  return { weight:suggested, lastMax:lastMax, trending:trending, sessions:maxWeights.length, note:note };
}

// ── Render exercise cards ────────────────────────────────────
function renderAll(){
  var currentPhase = getProgramState(new Date()).phase;
  var data = loadData();
  Object.keys(EXERCISES).forEach(function(dayId){
    var sections = EXERCISES[dayId];
    Object.keys(sections).forEach(function(sectionId){
      var container = document.getElementById(sectionId);
      if(!container) return;
      container.textContent = ''; // clear
      sections[sectionId].forEach(function(ex){
        buildCard(container, ex, dayId, data, currentPhase);
      });
    });
  });
  restoreWarmupStates();
}

function buildCard(container, ex, dayId, data, phase){
  phase = phase || getProgramState(new Date()).phase;
  var isDone = !!(data.checks && data.checks[ex.id]);
  var history = (data.history && data.history[ex.id]) || [];
  var lastEntry = history.length ? history[history.length-1] : null;

  var lastSummary = "";
  if(lastEntry){
    var parts = [];
    if(lastEntry.s1) parts.push("S1:" + lastEntry.s1);
    if(lastEntry.s2) parts.push("S2:" + lastEntry.s2);
    if(lastEntry.s3) parts.push("S3:" + lastEntry.s3);
    lastSummary = parts.join(" ");
  }

  var card = document.createElement("div");
  card.className = "exercise" + (isDone ? " done" : "");
  card.id = "card-" + ex.id;

  // Main row
  var mainDiv = document.createElement("div");
  mainDiv.className = "exercise-main";

  var checkBtn = document.createElement("button");
  checkBtn.className = "check-btn" + (isDone ? " done" : "");
  checkBtn.innerHTML = isDone ? "&#10003;" : "";
  checkBtn.onclick = (function(eid){ return function(){ toggleCheck(eid); }; })(ex.id);
  mainDiv.appendChild(checkBtn);

  var infoDiv = document.createElement("div");
  infoDiv.className = "exercise-info";
  var nameDiv = document.createElement("div");
  nameDiv.className = "exercise-name";
  nameDiv.textContent = getExerciseName(ex, phase);
  nameDiv.dataset.exId = ex.id;
  infoDiv.appendChild(nameDiv);
  var metaDiv = document.createElement("div");
  metaDiv.className = "exercise-meta";
  var setsSpan = document.createElement("span");
  setsSpan.className = "exercise-sets";
  setsSpan.textContent = getSetsForExercise(ex, phase).display;
  setsSpan.dataset.exId = ex.id;
  metaDiv.appendChild(setsSpan);
  if(lastSummary){
    var prevSpan = document.createElement("span");
    prevSpan.className = "prev-weight";
    prevSpan.textContent = lastSummary;
    metaDiv.appendChild(prevSpan);
  }
  infoDiv.appendChild(metaDiv);
  mainDiv.appendChild(infoDiv);

  var infoBtn = document.createElement("button");
  infoBtn.className = "info-btn";
  infoBtn.textContent = "i";
  infoBtn.onclick = (function(eid, ename, btn){ return function(){ toggleTip(btn, eid, ename); }; })(ex.id, getExerciseName(ex, phase), infoBtn);
  if(isDone){
    var editBtn = document.createElement("button");
    editBtn.className = "edit-entry-btn";
    editBtn.textContent = "Edit";
    editBtn.onclick = (function(eid){ return function(e){ e.stopPropagation(); openEditMode(eid); }; })(ex.id);
    mainDiv.appendChild(editBtn);
  }
  mainDiv.appendChild(infoBtn);
  card.appendChild(mainDiv);

  // Per-set check buttons for bodyweight exercises
  if(ex.noWeight){
    var setBtns = document.createElement("div");
    setBtns.className = "set-checks";
    var savedChecks = (data.setBChecks && data.setBChecks[ex.id]) || [false,false,false];
    ["S1","S2","S3"].forEach(function(lbl, si){
      var wrap = document.createElement("div");
      wrap.className = "set-check-wrap";
      var sbtn = document.createElement("button");
      sbtn.className = "set-check-btn" + (savedChecks[si] ? " done" : "");
      sbtn.id = "setcheck-" + ex.id + "-" + si;
      sbtn.textContent = savedChecks[si] ? "\u2713" : "";
      sbtn.onclick = (function(eid, idx){ return function(e){ e.stopPropagation(); toggleSetCheck(eid, idx); }; })(ex.id, si);
      var slbl = document.createElement("div");
      slbl.className = "set-check-lbl";
      slbl.textContent = lbl;
      wrap.appendChild(sbtn);
      wrap.appendChild(slbl);
      setBtns.appendChild(wrap);
    });
    card.appendChild(setBtns);
  }

  // Detail panel
  var detailDiv = document.createElement("div");
  detailDiv.className = "exercise-detail";

  if(!ex.noWeight){
    var suggestion = computeWeightSuggestion(history, phase, ex.type);
    if(suggestion){
      var sugP = document.createElement("p");
      sugP.className = "tip-text";
      var sugStrong = document.createElement("strong");
      sugStrong.textContent = "Suggested: ";
      var arrow = suggestion.trending ? "\u2191" : "\u2192";
      var sugDetail = document.createElement("span");
      sugDetail.style.color = "var(--muted)";
      var detailText = "last " + suggestion.sessions + " session" + (suggestion.sessions!==1?"s":"") + ": max " + suggestion.lastMax + " lbs";
      if(suggestion.note) detailText += " \u00b7 " + suggestion.note;
      sugDetail.textContent = detailText;
      sugP.appendChild(sugStrong);
      sugP.appendChild(document.createTextNode("~" + suggestion.weight + " lbs " + arrow + " "));
      sugP.appendChild(sugDetail);
      detailDiv.appendChild(sugP);
      if(ex.tip){
        var refP = document.createElement("p");
        refP.className = "tip-text";
        refP.style.cssText = "margin-top:4px;font-size:11px;color:var(--muted);";
        var refStrong = document.createElement("strong");
        refStrong.textContent = "Ref: ";
        refP.appendChild(refStrong);
        refP.appendChild(document.createTextNode(ex.tip));
        detailDiv.appendChild(refP);
      }
    } else if(ex.tip){
      var tipP = document.createElement("p");
      tipP.className = "tip-text";
      tipP.innerHTML = "<strong>Starting ref: </strong>" + ex.tip;
      detailDiv.appendChild(tipP);
    }
  } else if(ex.tip){
    var tipP = document.createElement("p");
    tipP.className = "tip-text";
    tipP.innerHTML = "<strong>Starting ref: </strong>" + ex.tip;
    detailDiv.appendChild(tipP);
  }
  if(ex.form){
    var formP = document.createElement("p");
    formP.className = "tip-text";
    formP.innerHTML = "<strong>Form: </strong>" + ex.form;
    detailDiv.appendChild(formP);
  }

  if(!ex.noWeight){
    var ph1 = lastEntry && lastEntry.s1 ? lastEntry.s1 : "-";
    var ph2 = lastEntry && lastEntry.s2 ? lastEntry.s2 : "-";
    var ph3 = lastEntry && lastEntry.s3 ? lastEntry.s3 : "-";

    var wsDiv = document.createElement("div");
    wsDiv.className = "weight-section";

    var wLabel = document.createElement("div");
    wLabel.className = "weight-label";
    wLabel.textContent = "Log Weight";
    if(lastSummary){
      var lSpan = document.createElement("span");
      lSpan.style.cssText = "color:var(--accent2);font-size:11px;font-weight:600;margin-left:6px;";
      lSpan.textContent = lastSummary;
      wLabel.appendChild(lSpan);
    }
    wsDiv.appendChild(wLabel);

    var grid = document.createElement("div");
    grid.className = "sets-grid";
    ["SET 1","SET 2","SET 3"].forEach(function(label, si){
      var col = document.createElement("div");
      col.className = "set-col";
      var lbl = document.createElement("div");
      lbl.className = "set-col-label";
      lbl.textContent = label;
      col.appendChild(lbl);
      var inp = document.createElement("input");
      inp.className = "weight-input";
      inp.type = "text";
      inp.inputMode = "decimal";
      inp.placeholder = [ph1,ph2,ph3][si];
      inp.id = "input-" + ex.id + "-s" + (si+1);
      col.appendChild(inp);
      grid.appendChild(col);
    });
    wsDiv.appendChild(grid);

    var saveBtn = document.createElement("button");
    saveBtn.className = "save-btn";
    saveBtn.textContent = "Save Sets";
    saveBtn.onclick = (function(eid, did){ return function(){ saveWeight(eid, did); }; })(ex.id, dayId);
    wsDiv.appendChild(saveBtn);

    var savedMsg = document.createElement("div");
    savedMsg.className = "saved-msg";
    savedMsg.id = "saved-" + ex.id;
    savedMsg.textContent = "Saved!";
    wsDiv.appendChild(savedMsg);

    var histLoading = document.createElement("div");
    histLoading.className = "hist-loading";
    histLoading.id = "hist-loading-" + ex.id;
    wsDiv.appendChild(histLoading);

    var histLive = document.createElement("div");
    histLive.id = "hist-live-" + ex.id;
    wsDiv.appendChild(histLive);

    var graphLink = document.createElement("button");
    graphLink.className = "show-graph-link";
    graphLink.textContent = "Show progression graph";
    graphLink.id = "graph-link-" + ex.id;
    graphLink.onclick = (function(eid, ename){ return function(){ toggleExGraph(eid, ename, this); }; })(ex.id, getExerciseName(ex, phase));
    wsDiv.appendChild(graphLink);

    var graphContainer = document.createElement("div");
    graphContainer.className = "graph-container";
    graphContainer.id = "graph-container-" + ex.id;
    graphContainer.style.display = "none";
    graphContainer.innerHTML = "<canvas id='graph-canvas-" + ex.id + "' height='160'></canvas>";
    wsDiv.appendChild(graphContainer);

    detailDiv.appendChild(wsDiv);
  }

  card.appendChild(detailDiv);
  container.appendChild(card);
}

// ── Toggle tip panel ─────────────────────────────────────────
function toggleTip(btn, exId, exName){
  var card = document.getElementById("card-" + exId);
  var detail = card.querySelector(".exercise-detail");
  var open = detail.classList.toggle("open");
  btn.classList.toggle("open", open);
  btn.textContent = open ? "x" : "i";
  if(open && exId && exName) fetchLiveHistory(exId, exName);
}

function openEditMode(exId){
  var card = document.getElementById("card-" + exId);
  if(!card) return;
  var detail = card.querySelector(".exercise-detail");
  var infoBtn = card.querySelector(".info-btn");
  if(detail) detail.classList.add("open");
  if(infoBtn){ infoBtn.classList.add("open"); infoBtn.textContent = "x"; }
  var data = loadData();
  var history = (data.history && data.history[exId]) || [];
  var last = history.length ? history[history.length-1] : null;
  if(last){
    ["s1","s2","s3"].forEach(function(s,i){
      var inp = document.getElementById("input-" + exId + "-" + s);
      if(inp){ inp.value = last[s] || ""; }
    });
  }
  var saveBtn = card.querySelector(".save-btn");
  if(saveBtn) saveBtn.textContent = "Update Sets";
  card.scrollIntoView({behavior:"smooth", block:"nearest"});
}

// ── Live history from Sheets ─────────────────────────────────
async function fetchLiveHistory(exId, exName){
  var loadEl = document.getElementById("hist-loading-" + exId);
  var liveEl = document.getElementById("hist-live-" + exId);
  if(!liveEl) return;
  if(loadEl) loadEl.textContent = "Loading...";
  try{
    var resp = await fetch(SHEETS_URL + "?type=history&exercise=" + encodeURIComponent(exName));
    var json = await resp.json();
    if(loadEl) loadEl.textContent = "";
    if(!json.rows || json.rows.length === 0){
      liveEl.innerHTML = "<div class='hist-loading'>No history yet</div>";
      return;
    }
    var rows = json.rows.slice(-3).reverse();
    var div = document.createElement("div");
    div.className = "history-list";
    rows.forEach(function(r){
      var entry = document.createElement("div");
      entry.className = "history-entry";
      var row = document.createElement("div");
      row.className = "h-row";
      var dateSpan = document.createElement("span");
      dateSpan.className = "h-date";
      dateSpan.textContent = fmtDate(r.date);
      row.appendChild(dateSpan);
      var setsSpan = document.createElement("span");
      setsSpan.className = "h-sets";
      var parts = [];
      if(r.set1) parts.push("S1:" + r.set1);
      if(r.set2) parts.push("S2:" + r.set2);
      if(r.set3) parts.push("S3:" + r.set3);
      setsSpan.textContent = parts.join(" ");
      row.appendChild(setsSpan);
      entry.appendChild(row);
      div.appendChild(entry);
    });
    liveEl.innerHTML = "";
    liveEl.appendChild(div);
    // Progressive overload nudge based on most recent entry
    var lastRow = json.rows[json.rows.length - 1];
    var nudgeNums = [lastRow.set1, lastRow.set2, lastRow.set3].filter(function(v){ return v && !isNaN(parseFloat(v)); });
    if(nudgeNums.length > 0){
      var avgLast = nudgeNums.reduce(function(a,b){ return a + parseFloat(b); }, 0) / nudgeNums.length;
      var exObj = null;
      Object.keys(EXERCISES).forEach(function(d){ Object.keys(EXERCISES[d]).forEach(function(s){ EXERCISES[d][s].forEach(function(ex){ if(ex.id === exId) exObj = ex; }); }); });
      var increment = (exObj && exObj.isDumbbell) ? 2.5 : 5;
      var suggested = Math.ceil(avgLast / increment) * increment + increment;
      var nudgeDiv = document.createElement("div");
      nudgeDiv.className = "overload-nudge";
      nudgeDiv.textContent = "\uD83C\uDFCB\uFE0F Today\u2019s target: " + suggested + " lbs (+" + increment + " progression)";
      liveEl.appendChild(nudgeDiv);
    }
  }catch(err){
    if(loadEl) loadEl.textContent = "";
    liveEl.innerHTML = "<div class='hist-loading'>Could not load history</div>";
  }
}

  try{
    var resp = await fetch(SHEETS_URL + "?type=cardio_history&day=" + encodeURIComponent(dayTitle) + "&dayId=" + encodeURIComponent(dayId));

    if(!json.rows || json.rows.length === 0){

      return;
    }
    var div = document.createElement("div");
    div.className = "history-list";
    json.rows.slice(-3).reverse().forEach(function(r){
      var entry = document.createElement("div");
      entry.className = "history-entry";
      var row = document.createElement("div");
      row.className = "h-row";
      var d = document.createElement("span");
      d.className = "h-date";
      d.textContent = fmtDate(r.date);

function toggleCheck(exId){
  var data = loadData();
  if(!data.checks) data.checks = {};

  saveData(data);
  var card = document.getElementById("card-" + exId);
  if(card){
    card.classList.toggle("done", data.checks[exId]);

    btn.classList.toggle("done", data.checks[exId]);
    btn.innerHTML = data.checks[exId] ? "&#10003;" : "";
    // Auto-collapse detail when marking complete

      var detail = card.querySelector(".exercise-detail");
      var infoBtn = card.querySelector(".info-btn");
      if(detail){ detail.classList.remove("open"); }
      if(infoBtn){ infoBtn.classList.remove("open"); infoBtn.textContent = "i"; }
    }
  }
}

function resetDay(dayId){
  var data = loadData();
  if(!data.checks) return;
  var sections = EXERCISES[dayId];
  if(!sections) return;
  Object.keys(sections).forEach(function(k){
    sections[k].forEach(function(ex){
      delete data.checks[ex.id];
      if(data.setBChecks) delete data.setBChecks[ex.id];
    });
  });
  if(data.warmupChecks){ delete data.warmupChecks[dayId]; delete data.warmupChecks[dayId + "-act"]; }

function toggleWarmup(dayId){

function restoreWarmupStates(){

function getExName(exId){
  var found = exId;
  Object.keys(EXERCISES).forEach(function(d){

      EXERCISES[d][s].forEach(function(ex){ if(ex.id === exId) found = getExerciseName(ex, getProgramState(new Date()).phase); });
    });
  });
  return found;
}

// ── Save weight - no renderAll to prevent mid-workout issues ─
async function saveWeight(exId, dayId){
  var s1el = document.getElementById("input-" + exId + "-s1");
  var s2el = document.getElementById("input-" + exId + "-s2");
  var s3el = document.getElementById("input-" + exId + "-s3");
  var s1 = s1el ? s1el.value.trim() : "";
  var s2 = s2el ? s2el.value.trim() : "";
  var s3 = s3el ? s3el.value.trim() : "";
  if(!s1 && !s2 && !s3){ showToast("Enter at least one set", "var(--accent2)"); return; }

  var now = new Date();
  var dateStr = now.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
  var dayTitle = "";
  DAYS.forEach(function(d){ if(d.id === dayId) dayTitle = d.title; });

  // Save locally
  var data = loadData();
  if(!data.history) data.history = {};
  if(!data.history[exId]) data.history[exId] = [];
  data.history[exId].push({date:dateStr, dayLabel:dayTitle, s1:s1, s2:s2, s3:s3});
  var hist = data.history[exId];
  if(hist.length >= 2 && hist[hist.length-2].date === dateStr){
    hist.splice(hist.length-2, 1);
  }
  saveData(data);

  // Update card display in-place without full re-render
  var summary = [];
  if(s1) summary.push("S1:" + s1);
  if(s2) summary.push("S2:" + s2);
  if(s3) summary.push("S3:" + s3);
  var summaryStr = summary.join(" ");
  var card = document.getElementById("card-" + exId);
  if(card){
    var prevEl = card.querySelector(".prev-weight");
    if(prevEl){ prevEl.textContent = summaryStr; }
    else{
      var metaEl = card.querySelector(".exercise-meta");
      if(metaEl){
        var sp = document.createElement("span");
        sp.className = "prev-weight";
        sp.textContent = summaryStr;
        metaEl.appendChild(sp);
      }
    }
    // Update placeholders
    if(s1el){ s1el.placeholder = s1; s1el.value = ""; }
    if(s2el){ s2el.placeholder = s2; s2el.value = ""; }
    if(s3el){ s3el.placeholder = s3; s3el.value = ""; }
    // Update weight label
    var wLabel = card.querySelector(".weight-label");
    if(wLabel){
      wLabel.textContent = "Log Weight";
      var lSpan = document.createElement("span");
      lSpan.style.cssText = "color:var(--accent2);font-size:11px;font-weight:600;margin-left:6px;";
      lSpan.textContent = summaryStr;
      wLabel.appendChild(lSpan);
    }
  }

  var msg = document.getElementById("saved-" + exId);
  if(msg){ msg.style.display = "block"; setTimeout(function(){ msg.style.display = "none"; }, 1500); }

  // Auto-collapse and mark complete
  setTimeout(function(){
    var card2 = document.getElementById("card-" + exId);
    if(card2){
      var detail2 = card2.querySelector(".exercise-detail");
      var infoBtn2 = card2.querySelector(".info-btn");
      if(detail2){ detail2.classList.remove("open"); }
      if(infoBtn2){ infoBtn2.classList.remove("open"); infoBtn2.textContent = "i"; }
      var saveBtnR = card2.querySelector(".save-btn");
      if(saveBtnR) saveBtnR.textContent = "Save Sets";
      // Mark complete
      var data2 = loadData();
      if(!data2.checks) data2.checks = {};
      if(!data2.checks[exId]){
        data2.checks[exId] = true;
        saveData(data2);
        card2.classList.add("done");
        var checkBtn2 = card2.querySelector(".check-btn");
        if(checkBtn2){ checkBtn2.classList.add("done"); checkBtn2.innerHTML = "&#10003;"; }
      }
    }
  }, 400);

  // Post to Sheets with pending queue for reliability
  var exName = getExName(exId);
  var params = "type=exercise&date=" + encodeURIComponent(dateStr) + "&day=" + encodeURIComponent(dayTitle) + "&exercise=" + encodeURIComponent(exName) + "&set1=" + encodeURIComponent(s1) + "&set2=" + encodeURIComponent(s2) + "&set3=" + encodeURIComponent(s3);
  queuePending(params);
  updatePendingIndicator();
  try{
    await fetch(SHEETS_URL + "?" + params, {method:"GET", mode:"no-cors"});
    dequeuePending(params);
    showToast("Saved to Sheets");
  }catch(e){
    showToast("Queued — will retry on next load", "var(--accent2)");
  }
  updatePendingIndicator();
}

  var dayTitle = "";

// ── Week utilities ───────────────────────────────────────────
function _isoWeekKey(d){
  var t = new Date(d); t.setHours(0,0,0,0);
  t.setDate(t.getDate() + 3 - (t.getDay()+6)%7);
  var w1 = new Date(t.getFullYear(),0,4);
  var wn = 1 + Math.round(((t-w1)/86400000 - 3 + (w1.getDay()+6)%7)/7);
  return t.getFullYear() + "-W" + String(wn).padStart(2,"0");
}
function getPacificWeekKey(){ return _isoWeekKey(new Date()); }
function getWeekKeyForDate(ds){ if(!ds) return null; var d=new Date(ds); return isNaN(d)?null:_isoWeekKey(d); }
function isThisWeek(ds){ return getWeekKeyForDate(ds) === getPacificWeekKey(); }

function weekDateRange(weekKey){
  var parts = weekKey.split("-W");
  var year = parseInt(parts[0]), wn = parseInt(parts[1]);
  var jan4 = new Date(year, 0, 4);
  var monday = new Date(jan4);
  monday.setDate(jan4.getDate() - (jan4.getDay()+6)%7 + (wn-1)*7);
  var sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  var opts = {month:"short", day:"numeric"};
  return "Week of " + monday.toLocaleDateString("en-US", opts) + " - " + sunday.toLocaleDateString("en-US", opts);
}

function weekStartDate(weekKey){
  var parts = weekKey.split("-W");
  var year = parseInt(parts[0]), wn = parseInt(parts[1]);
  var jan4 = new Date(year, 0, 4);
  var monday = new Date(jan4);
  monday.setDate(jan4.getDate() - (jan4.getDay()+6)%7 + (wn-1)*7);
  return monday.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

function isAdjacentWeek(wk1, wk2){
  var p1 = wk1.split("-W"), p2 = wk2.split("-W");
  var y1 = parseInt(p1[0]), w1 = parseInt(p1[1]);
  var y2 = parseInt(p2[0]), w2 = parseInt(p2[1]);
  return (y2 === y1 && w2 === w1 + 1) || (y2 === y1 + 1 && w2 === 1 && w1 >= 52);
}

function markDayComplete(dayId){
  var data = loadData();
  if(!data.weekDone) data.weekDone = {};
  var weekKey = getPacificWeekKey();
  if(!data.weekDone[weekKey]) data.weekDone[weekKey] = {};
  data.weekDone[weekKey][dayId] = true;
  saveData(data);
  updateDayTabColors();
}

function updateDayTabColors(){
  var data = loadData();
  var monday = getMondayOf(viewedDate);
  var mondayKey = toDateKey(monday);
  var weekOverride = WEEK_DOW_OVERRIDES[mondayKey] || {};
  var panelIds = ['d1','d2','d3','d4','d5'];
  var pills = document.querySelectorAll('.day-pill');
  pills.forEach(function(pill, i){
    if(i >= panelIds.length) return;
    var dayDate = new Date(monday); dayDate.setDate(monday.getDate()+i);
    var weekKey = _isoWeekKey(dayDate);
    var actualPanelId = (weekOverride[i] !== undefined) ? weekOverride[i] : panelIds[i];
    var done = !!(data.weekDone && data.weekDone[weekKey] && data.weekDone[weekKey][actualPanelId]);
    pill.classList.toggle('week-done', done && !pill.classList.contains('rest'));
  });
}

var _heatmapRows = [];
function buildHeatmap(rows, period){
  if(rows) _heatmapRows = rows;
  period = period || "1mo";
  var grid = document.getElementById("heatmap-grid");
  var startLabel = document.getElementById("heatmap-start");
  if(!grid) return;
  var gymDates = {}, actDates = {};
  _heatmapRows.forEach(function(r){
    if(!r.date) return;
    var key = new Date(r.date).toDateString();
    if(r.day && r.day.indexOf("DAY") === 0) gymDates[key] = true;
    else actDates[key] = true;
  });
  grid.innerHTML = "";
  var today = new Date(); today.setHours(0,0,0,0);
  var daysBack;
  if(period === "2wk") daysBack = 13;
  else if(period === "3mo") daysBack = 89;
  else if(period === "all"){
    var earliest = new Date(today);
    _heatmapRows.forEach(function(r){
      if(r.date){ var d = new Date(r.date); if(!isNaN(d) && d < earliest) earliest = d; }
    });
    daysBack = Math.max(Math.floor((today - earliest) / 86400000), 13);
  } else {
    daysBack = 29;
  }
  var start = new Date(today); start.setDate(today.getDate() - daysBack);
  if(startLabel) startLabel.textContent = start.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  for(var i=0; i<=daysBack; i++){
    var d = new Date(start); d.setDate(start.getDate() + i);
    var key = d.toDateString();
    var cell = document.createElement("div");
    cell.className = "heatmap-day" + (gymDates[key] ? " active" : (actDates[key] ? " activity" : ""));
    cell.title = d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    grid.appendChild(cell);
  }
}

    var displayKey = dayLabelMap[rawKey] || rawKey;
    counts[displayKey] = (counts[displayKey]||0) + 1;
  });
  var keys = Object.keys(counts);
  if(keys.length === 0) return;
  if(_dayTypeChart){ _dayTypeChart.destroy(); }
  _dayTypeChart = new Chart(canvas, {
    type:"doughnut",
    data:{labels:keys,datasets:[{data:keys.map(function(k){ return counts[k]; }),backgroundColor:["#C42B1C","#B86F00","#2A5E44","#3D7DB3","#D4881A","#A03030","#4D8F5C"],borderColor:"#F0EDE6",borderWidth:2}]},
    options:{responsive:true,plugins:{legend:{labels:{color:"#948F88",font:{size:10},pointStyle:"line",usePointStyle:true}}}}
  });
}

var _avgDurChart = null;
function buildAvgDurByDay(rows){
  var canvas = document.getElementById("avgDurChart");
  if(!canvas) return;
  var totals = {}, cnts = {};
  rows.forEach(function(r){
    if(!r.day || !r.duration || isNaN(parseFloat(r.duration))) return;
    var key = r.day.split(" - ")[0].trim();
    totals[key] = (totals[key]||0) + parseFloat(r.duration);
    cnts[key] = (cnts[key]||0) + 1;
  });
  var keys = Object.keys(totals);
  if(keys.length === 0) return;
  if(_avgDurChart){ _avgDurChart.destroy(); }
  _avgDurChart = new Chart(canvas, {
    type:"bar",
    data:{labels:keys,datasets:[{label:"Avg Duration (min)",data:keys.map(function(k){ return Math.round(totals[k]/cnts[k]); }),backgroundColor:"rgba(42,94,68,0.7)",borderColor:"#2A5E44",borderWidth:1}]},
    options:{responsive:true,plugins:{legend:{labels:{color:"#948F88",font:{size:10},pointStyle:"line",usePointStyle:true}}},scales:{x:{ticks:{color:"#948F88",font:{size:9},maxRotation:30},grid:{color:"#C5C0B8"}},y:{ticks:{color:"#948F88",font:{size:9}},grid:{color:"#C5C0B8"}}}}
  });
}

var _consistencyChart = null;
function buildConsistencyChart(rows){
  var canvas = document.getElementById("consistencyChart");
  if(!canvas) return;
  var weekCounts = {};
  var weekOrder = [];
  rows.forEach(function(r){
    var wk = getWeekKeyForDate(r.date);
    if(!wk) return;
    if(!weekCounts[wk]){ weekCounts[wk] = 0; weekOrder.push(wk); }
    weekCounts[wk]++;
  });
  var uniqueWeeks = weekOrder.filter(function(v,i){ return weekOrder.indexOf(v)===i; }).slice(-12);
  if(uniqueWeeks.length === 0) return;
  var pcts = uniqueWeeks.map(function(w){ return Math.min(Math.round((weekCounts[w]/4)*100), 100); });
  var colors = pcts.map(function(p){ return p >= 100 ? "rgba(42,94,68,0.8)" : "rgba(196,43,28,0.6)"; });
  if(_consistencyChart){ _consistencyChart.destroy(); }
  _consistencyChart = new Chart(canvas, {
    type:"bar",
    data:{labels:uniqueWeeks.map(function(w){ return weekStartDate(w); }),datasets:[{label:"% of target (4 sessions)",data:pcts,backgroundColor:colors,borderColor:colors.map(function(c){ return c.replace("0.8","1").replace("0.6","1"); }),borderWidth:1}]},
    options:{responsive:true,plugins:{legend:{labels:{color:"#948F88",font:{size:10},pointStyle:"line",usePointStyle:true}}},scales:{x:{ticks:{color:"#948F88",font:{size:8},maxRotation:45},grid:{color:"#C5C0B8"}},y:{min:0,max:100,ticks:{color:"#948F88",font:{size:9},callback:function(v){ return v+"%"; }},grid:{color:"#C5C0B8"}}}}
  });
}

function buildPRTable(){
  var el = document.getElementById("pr-table");
  if(!el) return;
  var data = loadData();
  var history = data.history || {};
  var prs = [];
  Object.keys(history).forEach(function(exId){
    var entries = history[exId];
    var exName = getExName(exId);
    var maxWt = 0;
    entries.forEach(function(e){
      [e.s1,e.s2,e.s3].forEach(function(v){
        var n = parseFloat(v);
        if(!isNaN(n) && n > maxWt) maxWt = n;
      });
    });
    if(maxWt > 0) prs.push({name:exName, weight:maxWt});
  });
  if(prs.length === 0){ el.innerHTML = "<div class='hist-loading'>No exercise data logged yet</div>"; return; }
  prs.sort(function(a,b){ return b.weight - a.weight; });
  var html = "<div class='pr-card'>";
  prs.forEach(function(p){
    html += "<div class='pr-row'><span class='pr-name'>" + p.name + "</span><span class='pr-val'>" + p.weight + " lbs</span></div>";
  });
  html += "</div>";
  el.innerHTML = html;
}

var _strengthIndexChart = null;
function buildStrengthIndex(){
  var canvas = document.getElementById("strengthIndexChart");
  if(!canvas) return;
  var data = loadData();
  var history = data.history || {};
  // Build map: date -> list of max set weights (one per exercise)
  var dateMaxes = {};
  Object.keys(history).forEach(function(exId){
    var entries = history[exId];
    entries.forEach(function(e){
      var maxWt = 0;
      [e.s1,e.s2,e.s3].forEach(function(v){
        var n = parseFloat(v);
        if(!isNaN(n) && n > maxWt) maxWt = n;
      });
      if(maxWt > 0){
        if(!dateMaxes[e.date]) dateMaxes[e.date] = [];
        dateMaxes[e.date].push(maxWt);
      }
    });
  });
  var dates = Object.keys(dateMaxes).sort(function(a,b){ return new Date(a)-new Date(b); });
  if(dates.length < 2) return;
  var avgs = dates.map(function(d){
    var vals = dateMaxes[d];
    return Math.round(vals.reduce(function(a,b){ return a+b; },0) / vals.length);
  });
  if(_strengthIndexChart){ _strengthIndexChart.destroy(); }
  _strengthIndexChart = new Chart(canvas, {
    type:"line",
    data:{labels:dates.map(function(d){ return fmtDate(d).replace(", 2026",""); }),datasets:[{label:"Strength Index",data:avgs,borderColor:"#C42B1C",backgroundColor:"rgba(196,43,28,0.08)",tension:0.3,pointRadius:3,pointBackgroundColor:"#C42B1C"}]},
    options:{responsive:true,plugins:{legend:{labels:{color:"#948F88",font:{size:10},pointStyle:"line",usePointStyle:true}}},scales:{x:{ticks:{color:"#948F88",font:{size:9},maxRotation:45},grid:{color:"#C5C0B8"}},y:{ticks:{color:"#948F88",font:{size:9}},grid:{color:"#C5C0B8"}}}}
  });
}

var _top3Charts = [];
function buildTop3Progressions(){
  var el = document.getElementById("top3-progressions");
  if(!el) return;
  var data = loadData();
  var history = data.history || {};
  // Find top 3 exercises by session count
  var exCounts = Object.keys(history).map(function(exId){
    return {exId:exId, count:history[exId].length};
  });
  exCounts.sort(function(a,b){ return b.count - a.count; });
  var top3 = exCounts.slice(0,3);
  _top3Charts.forEach(function(c){ c.destroy(); });
  _top3Charts = [];
  el.innerHTML = "";
  if(top3.length === 0){ el.innerHTML = "<div class='hist-loading'>No exercise data yet</div>"; return; }
  top3.forEach(function(item, idx){
    var exId = item.exId;
    var exName = getExName(exId);
    var entries = history[exId].slice().sort(function(a,b){ return new Date(a.date)-new Date(b.date); });
    var labels = entries.map(function(e){ return fmtDate(e.date).replace(", 2026",""); });
    var maxSets = entries.map(function(e){
      var m = 0;
      [e.s1,e.s2,e.s3].forEach(function(v){ var n=parseFloat(v); if(!isNaN(n)&&n>m) m=n; });
      return m || null;
    });
    var wrap = document.createElement("div");
    wrap.className = "graph-container";
    wrap.style.marginBottom = "10px";
    var title = document.createElement("div");
    title.className = "graph-title";
    title.textContent = exName;
    wrap.appendChild(title);
    var canvasEl = document.createElement("canvas");
    canvasEl.height = 120;
    canvasEl.id = "top3-canvas-" + idx;
    wrap.appendChild(canvasEl);
    el.appendChild(wrap);
    var colors = ["#C42B1C","#B86F00","#2A5E44"];
    var bgColors = ["rgba(196,43,28,0.08)","rgba(184,111,0,0.08)","rgba(42,94,68,0.08)"];
    _top3Charts.push(new Chart(canvasEl, {
      type:"line",
      data:{labels:labels,datasets:[{label:"Max set (lbs)",data:maxSets,borderColor:colors[idx],backgroundColor:bgColors[idx],tension:0.3,pointRadius:3,pointBackgroundColor:colors[idx],spanGaps:true}]},
      options:{responsive:true,plugins:{legend:{labels:{color:"#948F88",font:{size:9},pointStyle:"line",usePointStyle:true}}},scales:{x:{ticks:{color:"#948F88",font:{size:8},maxRotation:45},grid:{color:"#C5C0B8"}},y:{ticks:{color:"#948F88",font:{size:8}},grid:{color:"#C5C0B8"}}}}
    }));
  });
}

// ── Stats panel (updated with weekly + all-time graphs) ───────
var _weeklyChart = null;
var _allTimeChart = null;
async function loadStats(){
  var weekEl = document.getElementById("stats-week");
  if(!weekEl) return;
  weekEl.innerHTML = "<div style='color:var(--muted);font-size:13px;'>Loading...</div>";
  try{
    var resp = await fetch(SHEETS_URL + "?type=stats_workouts");
    var json = await resp.json();
    var rows = (json && json.rows) ? json.rows : [];

    // ── Weekly summary ──────────────────────────────────────
    var weekRows = rows.filter(function(r){ return isThisWeek(r.date); });
    var totalDur=0, totalCal=0, totalHR=0, hrCnt=0, sessionCnt=weekRows.length;
    weekRows.forEach(function(r){
      if(r.duration && !isNaN(parseFloat(r.duration))) totalDur += parseFloat(r.duration);
      if(r.calories && !isNaN(parseFloat(r.calories))) totalCal += parseFloat(r.calories);
      if(r.heartRate && !isNaN(parseFloat(r.heartRate))){ totalHR += parseFloat(r.heartRate); hrCnt++; }
    });
    var weekKey = getPacificWeekKey();
    var html = "<div class='week-summary-card'>"
      + "<div class='week-summary-row'><span class='week-label'>Week</span><span class='week-val'>" + weekDateRange(weekKey) + "</span></div>"
      + "<div class='week-summary-row'><span class='week-label'>Sessions</span><span class='week-val'>" + sessionCnt + "</span></div>"
      + (totalDur>0?"<div class='week-summary-row'><span class='week-label'>Total Duration</span><span class='week-val'>"+Math.round(totalDur)+" min</span></div>":"")
      + (totalCal>0?"<div class='week-summary-row'><span class='week-label'>Total Calories</span><span class='week-val'>"+Math.round(totalCal)+"</span></div>":"")
      + (hrCnt>0?"<div class='week-summary-row'><span class='week-label'>Avg Heart Rate</span><span class='week-val'>"+(totalHR/hrCnt).toFixed(0)+" BPM</span></div>":"")
      + "</div>";
    weekEl.innerHTML = html;

    // ── Streak calculation ───────────────────────────────────
    var weekCounts = {};
    rows.forEach(function(r){
      var wk = getWeekKeyForDate(r.date);
      if(wk) weekCounts[wk] = (weekCounts[wk]||0) + 1;
    });
    var allWeeks = Object.keys(weekCounts).sort();
    var qualWeeks = allWeeks.filter(function(w){ return weekCounts[w] >= 3; });
    var bestStreak = 0, runStreak = 0;
    for(var wi = 0; wi < qualWeeks.length; wi++){
      runStreak = (wi === 0 || !isAdjacentWeek(qualWeeks[wi-1], qualWeeks[wi])) ? 1 : runStreak + 1;
      if(runStreak > bestStreak) bestStreak = runStreak;
    }
    var curWk = getPacificWeekKey();
    var currentStreak = 0;
    if(qualWeeks.length > 0){
      var lastQual = qualWeeks[qualWeeks.length - 1];
      if(lastQual === curWk || isAdjacentWeek(lastQual, curWk)){
        currentStreak = runStreak;
      }
    }
    var streakUnit = " wk";
    var curEl = document.getElementById("streak-current");
    var bestEl = document.getElementById("streak-best");
    if(curEl) curEl.textContent = currentStreak + streakUnit;
    if(bestEl) bestEl.textContent = bestStreak + streakUnit;

    // ── Weekly chart — last 10 sessions, duration bars ──────
    var recentRows = rows.slice(-10);
    var wLabels = recentRows.map(function(r){ return fmtDate(r.date).replace(", 2026",""); });
    var wDur = recentRows.map(function(r){ return parseFloat(r.duration)||0; });
    var wCal = recentRows.map(function(r){ return parseFloat(r.calories)||0; });
    var wCanvas = document.getElementById("weeklyChart");
    if(wCanvas){
      if(_weeklyChart){ _weeklyChart.destroy(); }
      _weeklyChart = new Chart(wCanvas,{
        type:"bar",
        data:{
          labels:wLabels,
          datasets:[
            {label:"Duration (min)",data:wDur,backgroundColor:"rgba(196,43,28,0.7)",borderColor:"#C42B1C",borderWidth:1,yAxisID:"y"},
            {label:"Calories",data:wCal,backgroundColor:"rgba(184,111,0,0.5)",borderColor:"#B86F00",borderWidth:1,yAxisID:"y1"}
          ]
        },
        options:{
          responsive:true,
          plugins:{legend:{labels:{color:"#948F88",font:{size:10},pointStyle:"line",usePointStyle:true}}},
          scales:{
            x:{ticks:{color:"#948F88",font:{size:9},maxRotation:45},grid:{color:"#C5C0B8"}},
            y:{ticks:{color:"#948F88",font:{size:9}},grid:{color:"#C5C0B8"},title:{display:true,text:"min",color:"#948F88",font:{size:9}}},
            y1:{position:"right",ticks:{color:"#948F88",font:{size:9}},grid:{drawOnChartArea:false},title:{display:true,text:"cal",color:"#948F88",font:{size:9}}}
          }
        }
      });
    }

    // ── All-time chart — rolling avg HR line ─────────────────
    var hrRows = rows.filter(function(r){ return r.heartRate && !isNaN(parseFloat(r.heartRate)); });
    var atLabels = hrRows.map(function(r){ return fmtDate(r.date).replace(", 2026",""); });
    var atHR = hrRows.map(function(r){ return parseFloat(r.heartRate); });
    var atDur = hrRows.map(function(r){ return parseFloat(r.duration)||null; });
    var atCanvas = document.getElementById("allTimeChart");
    if(atCanvas && hrRows.length > 0){
      if(_allTimeChart){ _allTimeChart.destroy(); }
      _allTimeChart = new Chart(atCanvas,{
        type:"line",
        data:{
          labels:atLabels,
          datasets:[
            {label:"Avg HR (BPM)",data:atHR,borderColor:"#C42B1C",backgroundColor:"rgba(196,43,28,0.08)",tension:0.3,pointRadius:3,pointBackgroundColor:"#C42B1C",yAxisID:"y"},
            {label:"Duration (min)",data:atDur,borderColor:"#2A5E44",backgroundColor:"rgba(42,94,68,0.08)",tension:0.3,pointRadius:3,pointBackgroundColor:"#2A5E44",spanGaps:true,yAxisID:"y1"}
          ]
        },
        options:{
          responsive:true,
          plugins:{legend:{labels:{color:"#948F88",font:{size:10},pointStyle:"line",usePointStyle:true}}},
          scales:{
            x:{ticks:{color:"#948F88",font:{size:9},maxRotation:45},grid:{color:"#C5C0B8"}},
            y:{ticks:{color:"#948F88",font:{size:9}},grid:{color:"#C5C0B8"},title:{display:true,text:"BPM",color:"#948F88",font:{size:9}}},
            y1:{position:"right",ticks:{color:"#948F88",font:{size:9}},grid:{drawOnChartArea:false},title:{display:true,text:"min",color:"#948F88",font:{size:9}}}
          }
        }
      });
    } else if(atCanvas){
      atCanvas.parentElement.innerHTML = "<div style='color:var(--muted);font-size:13px;padding:10px 0;'>Log more workouts with HR data to see this graph.</div>";
    }

    buildHeatmap(rows, "1mo");
    buildCardioDonut(rows);
    buildMonthlyCount(rows);
    buildDayTypeDistribution(rows);
    buildAvgDurByDay(rows);
    buildConsistencyChart(rows);
    buildPRTable();
    buildStrengthIndex();
    buildTop3Progressions();

  }catch(err){
    if(weekEl) weekEl.innerHTML = "<div style='color:var(--muted);font-size:13px;'>Could not load stats.</div>";
  }
}


// ── Cardio pill toggle ────────────────────────────────────────
function toggleCardioPill(btn, inputId, value){
  var inp = document.getElementById(inputId);
  var isActive = btn.classList.contains("active");
  btn.closest(".cardio-pills").querySelectorAll(".cardio-pill").forEach(function(p){ p.classList.remove("active"); });
  if(!isActive){
    btn.classList.add("active");
    if(inp) inp.value = value;
  } else {
    if(inp) inp.value = "";
  }
  // Auto-save if this is a finisher cardio input (not the activity panel)
  if(inputId && inputId.indexOf("cardio-d") === 0){
    saveCardioPersist(inputId.replace("cardio-",""));
  }
}

// ── Phase header ─────────────────────────────────────────────
function renderPhaseHeader(state){
  var el = document.getElementById('phase-strip');
  if(!el) return;
  while(el.firstChild) el.removeChild(el.firstChild); // clear
  if(state.isRest || state.preProgram){ el.className='phase-strip'; return; }

  var dc = state.isDeload ? ' deload' : '';
  el.className = 'phase-strip' + dc;

  var dayDiv = document.createElement('div');
  dayDiv.className = 'phase-day';
  dayDiv.textContent = state.dayName + ' \u2014 ' + state.workoutType;
  el.appendChild(dayDiv);

  var wkLabel = state.phaseLength
    ? state.phaseName + ' \xb7 Week ' + state.weekInPhase + ' of ' + state.phaseLength
    : state.phaseName + ' \xb7 Week ' + state.weekInPhase;
  var infoDiv = document.createElement('div');
  infoDiv.className = 'phase-info' + dc;
  infoDiv.textContent = wkLabel;
  el.appendChild(infoDiv);

  var schemeDiv = document.createElement('div');
  schemeDiv.className = 'phase-scheme';
  schemeDiv.textContent = state.repScheme;
  el.appendChild(schemeDiv);
}

function updateDeloadBanner(panelId, state){
  var el = document.getElementById('deload-banner-'+panelId);
  if(!el) return;
  while(el.firstChild) el.removeChild(el.firstChild); // clear
  if(!state.isDeload) return;
  var banner = document.createElement('div');

  banner.textContent = '\uD83D\uDD04 DELOAD WEEK \u2014 Reduce load ~40%, focus on form & recovery';

}

function updateWeekBanner(panelId, state){
  var el = document.getElementById('week-banner-'+panelId);
  if(!el) return;
  while(el.firstChild) el.removeChild(el.firstChild); // clear
  if(!state.banner) return;
  var banner = document.createElement('div');
  banner.className = 'week-banner';
